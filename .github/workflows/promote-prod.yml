name: Promote to Production

# Deploy a producción (DigitalOcean). SOLO manual: no se dispara solo nunca.
# Como el plan Free + repo privado no permite Required Reviewers en
# Environments, este workflow_dispatch ES el gate de aprobación: prod no se
# mueve hasta que vos vayas a Actions → "Run workflow" y tipees "deploy".
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Escribí "deploy" para confirmar el deploy a PRODUCCIÓN'
        required: true
        type: string

concurrency:
  group: promote-production
  cancel-in-progress: false

jobs:
  promote-production:
    # Doble seguro: aunque le des Run, no procede si no tipeaste exactamente "deploy".
    if: ${{ inputs.confirm == 'deploy' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean (production)
        # Pineado al SHA del release (v1.2.5) — un tag es mutable y este action
        # recibe SSH_PRIVATE_KEY de prod: si comprometen el tag, te roban la llave.
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # ponytail: 45m porque next build tarda ~25min en 2GB droplet
          command_timeout: 45m
          script: |
            set -e
            # Path del repo en el host. Parametrizado vía secret para no hardcodear
            # (consistente con STAGING_REPO_PATH en deploy.yml). Fallback a /prosell
            # si el secret no está seteado → backward-compatible.
            cd ${{ secrets.PROD_REPO_PATH || '/prosell' }}
            git pull origin main
            docker compose -f docker/docker-compose.prod.yml up -d --build

            # Run pending migrations (wait for API to be healthy first)
            echo "Waiting for API container to be ready..."
            for i in {1..30}; do
              if docker exec prosell-prod-api python -c "print('ready')" 2>/dev/null; then
                break
              fi
              sleep 2
            done
            echo "Running database migrations..."
            docker exec prosell-prod-api python -m alembic upgrade head

            docker system prune -f

      - name: Health check post-deploy
        run: |
          sleep 30
          # Path completo con prefijo /api/v1/ y slash final. -L sigue el 307
          # redirect del endpoint. Sin esto el workflow falla con 404 (path sin
          # prefijo) o 22 (curl exit code on 3xx sin -L).
          curl -fL --retry 5 --retry-delay 10 --retry-connrefused \
            https://api.prosellweb.com/api/v1/health/

      - name: Notify production deploy done
        if: success()
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          if [ -n "$WEBHOOK_URL" ]; then
            curl -X POST "$WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d '{"text":"🚀 Production deploy done."}' \
              || echo "⚠️ notify failed (non-fatal) — el deploy igual fue exitoso"
          fi
