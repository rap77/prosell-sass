name: graphify

# Build the code knowledge graph on push, PR, and weekly schedule.
# Artifacts: graph.json (data), GRAPH_REPORT.md (audit). graph.html is
# only generated for graphs ≤ 5000 nodes (skipped for this repo's ~20k).
# Pages: deploys only on push to main. The `pages` job uses
# continue-on-error: true because GitHub Pages requires a Pro/Team/Enterprise
# plan for private repos; this repo is on the Free plan, so the deploy step
# will fail with 404 ("Get Pages site failed"). Silencing the job keeps
# main green while still building the KG artifact (available for 30 days
# in GitHub Actions). To re-enable public Pages: upgrade plan or make the
# repo public, then drop the continue-on-error flag.
# Only GRAPH_REPORT.md is published to Pages — graph.json is not (it
# contains internal paths and is 22MB).
#
# .graphifyignore at repo root lists paths the AST extractor must skip
# (.env*, secrets/, vendor dirs, binaries) so the published graph
# doesn't leak internal topology.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Sunday 03:00 UTC — pick a non-:00 minute to spread CI load.
    - cron: "3 3 * * 0"
  workflow_dispatch:

# Pin graphify hook off in CI to avoid recursive triggers.
env:
  GRAPHIFY_SKIP_HOOK: "1"
  PYTHONHASHSEED: "0" # Deterministic clustering across CI runs.

# Top-level: minimum safe default that propagates to any future job.
# Job-specific permissions are declared inside each job.
permissions:
  contents: read

jobs:
  build:
    name: Build knowledge graph
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install graphify
        # PyPI package is 'graphifyy' (double-y); binary is 'graphify' (single-y).
        # Pin to exact version to prevent supply-chain drift. Hash-pinning
        # is tracked in #37 (needs PyPI network access to fetch sha256).
        run: pip install graphifyy==0.8.41

      - name: Build knowledge graph
        # `graphify update .` is code-only (no LLM needed) and re-runs
        # AST extraction + clustering, writing graph.json and
        # GRAPH_REPORT.md to graphify-out/. .graphifyignore excludes
        # sensitive paths before extraction.
        run: graphify update .

      - name: Verify required graph artifacts exist
        # graph.html is OPTIONAL — graphify skips it for graphs > 5000
        # nodes. This repo's graph is ~20k nodes, so we only require
        # the always-generated artifacts.
        run: |
          test -f graphify-out/graph.json || (echo "::error::graph.json missing" && exit 1)
          test -f graphify-out/GRAPH_REPORT.md || (echo "::error::GRAPH_REPORT.md missing" && exit 1)
          echo "✓ Required graphify artifacts present"

      - name: Upload graph artifacts
        uses: actions/upload-artifact@v4
        with:
          name: graphify-output
          path: |
            graphify-out/graph.json
            graphify-out/GRAPH_REPORT.md
          retention-days: 30
          if-no-files-found: error

  pages:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Pages may not be enabled on the repo (plan Free + private repo).
    # `continue-on-error: true` lets the job's deploy steps fail silently
    # when `actions/configure-pages@v5` can't reach the Pages site, so
    # main stays green. The KG build artifact (job `build`) is unaffected.
    # See workflow header comment for context.
    continue-on-error: true
    # Only the pages job needs write/deploy perms.
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install graphify
        run: pip install graphifyy==0.8.41

      - name: Build knowledge graph
        run: graphify update .

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Only publish GRAPH_REPORT.md to public Pages — graph.json (22MB,
      # contains internal paths) is intentionally NOT published.
      - name: Prepare Pages artifact
        run: |
          mkdir -p pages-out
          cp graphify-out/GRAPH_REPORT.md pages-out/
          if [ -f graphify-out/graph.html ]; then
            cp graphify-out/graph.html pages-out/
          fi
          ls -la pages-out/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages-out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
