name: Deploy Staging

# Se dispara cuando CI termina verde en main, y deploya AUTOMÁTICO al staging
# local (tu PC, vía self-hosted runner). Producción NO está acá: vive en
# promote-prod.yml y se dispara MANUAL. Así staging es automático y prod
# requiere tu acción explícita.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: # permite disparar staging a mano desde la UI

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # STAGING — auto-deploy en tu PC local vía self-hosted runner.
  # El job corre en tu máquina (no en GitHub cloud) porque ahí vive el
  # contenedor de staging. Si la PC está apagada, el job queda en cola hasta
  # que el runner vuelva a estar online.
  # ===========================================================================
  deploy-staging:
    # Solo procede si fue disparo manual, o si el run de CI fue exitoso en main.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: [self-hosted, staging]
    steps:
      - name: Deploy to local staging
        working-directory: ${{ secrets.STAGING_REPO_PATH }}
        run: |
          set -e

          # Archivos de config del host (gitignored o untracked en main, pero el host
          # puede tenerlos tracked en commits viejos con cambios locales sin commit).
          # El pull NO debe pisarlos. Patrón análogo a docs/PROMOTE_PROD_RUNBOOK.md
          # §A.2-A.3, pero auto-aplicado para que staging no se rompa en silencio.
          # IMPORTANTE: las JWT keys también van acá — apps/api/Dockerfile las COPYea
          # al container, y si el host no las tiene, el api image arranca sin keys y
          # el healthcheck falla.
          HOST_CONFIG_FILES=(
            ".env.staging"
            ".env.staging.local"
            ".env.local"
            "apps/api/keys/private.pem"
            "apps/api/keys/public.pem"
          )
          BACKUP_DIR="/tmp/prosell-staging-host-config-$(date +%s)"
          mkdir -p "$BACKUP_DIR"
          for f in "${HOST_CONFIG_FILES[@]}"; do
            if [ -f "$f" ]; then
              cp "$f" "$BACKUP_DIR/" && echo "✓ backed up host config: $f"
            fi
          done

          # Intentar pull limpio
          if ! git pull origin main; then
            echo "::warning::git pull abortó (probablemente cambios locales tracked en archivos del host)."
            echo "::warning::Aplicando destrabe automático: descartar cambios tracked + remover del index local + borrar del disco (el restore post-pull los recupera) + reintentar."
            for f in "${HOST_CONFIG_FILES[@]}"; do
              git checkout -- "$f" 2>/dev/null || true
              git rm --cached "$f" 2>/dev/null || true
              # Después de `git rm --cached`, el archivo queda UNTRACKED en disco.
              # `git pull` se rehúsa a borrar untracked files, así que hay que
              # borrarlo manualmente. El restore post-pull lo recupera del backup.
              rm -f "$f"
            done
            git pull origin main
          fi

          # Restaurar archivos del host desde backup (pueden haber sido borrados o sobreescritos)
          for f in "${HOST_CONFIG_FILES[@]}"; do
            if [ -f "$BACKUP_DIR/$(basename "$f")" ]; then
              cp "$BACKUP_DIR/$(basename "$f")" "$f" && echo "✓ restored host config: $f"
            fi
          done

          # Si las JWT keys no existen post-restore (host nunca las tuvo, o se
          # perdieron), generarlas. scripts/generate-jwt-keys.sh regenera AMBOS
          # archivos (no es idempotente), por eso solo lo llamamos si FALTAN LAS
          # DOS — regenerar una sola rompería el par (private/public mismatch).
          # ATENCIÓN: rotar keys invalida tokens en circulación; en prod esto se
          # hace con runbook, acá es acceptable porque staging es dev.
          if [ ! -f "apps/api/keys/private.pem" ] && [ ! -f "apps/api/keys/public.pem" ]; then
            echo "::warning::JWT keys missing post-restore, generating fresh pair with scripts/generate-jwt-keys.sh"
            ./scripts/generate-jwt-keys.sh
          fi

          # Build imágenes PRIMERO. Si falla acá, ningún container se reinicia —
          # los viejos siguen up sirviendo código anterior (downtime = 0). Esto
          # separa el failure surface: build error vs deploy error vs runtime error.
          # --env-file: el compose usa ${VAR} para los secrets (no hardcodeados);
          # se interpolan desde .env.staging, que vive en el host (gitignored).
          docker compose --env-file .env.staging -f docker/docker-compose.staging.yml build

      - name: Deploy containers
        working-directory: ${{ secrets.STAGING_REPO_PATH }}
        run: |
          set -e

          # STAGED DEPLOY: DB primero, sync password, luego el resto.
          # El volumen de postgres guarda la password original; si .env.staging
          # tiene una diferente, el API falla. Sincronizar DESPUÉS de que DB
          # inicie pero ANTES de que API intente conectar.

          # 1. Levantar solo infra (DB, Redis, MinIO) — sin API/Web
          docker compose --env-file .env.staging -f docker/docker-compose.staging.yml up -d db redis minio

          # 2. Esperar a que DB esté healthy
          echo "Waiting for DB to be healthy..."
          for i in {1..30}; do
            if docker exec prosell-staging-db pg_isready -U postgres >/dev/null 2>&1; then
              echo "✓ DB ready"
              break
            fi
            sleep 2
          done

          # 3. Sincronizar password DESPUÉS de que DB inicie
          PG_PASS=$(grep -E '^POSTGRES_PASSWORD=' .env.staging | cut -d= -f2- | tr -d '"' | tr -d "'")
          if [ -n "$PG_PASS" ]; then
            docker exec prosell-staging-db psql -U postgres -c "ALTER USER postgres WITH PASSWORD '$PG_PASS';" \
              && echo "✓ postgres password synced" \
              || echo "⚠️ password sync failed"
          fi

          # 4. Ahora levantar API y Web (que dependen de DB con password correcto)
          docker compose --env-file .env.staging -f docker/docker-compose.staging.yml up -d
          docker system prune -f

      - name: Print container logs on failure
        if: failure()
        working-directory: ${{ secrets.STAGING_REPO_PATH }}
        run: |
          # Diagnóstico: si el deploy falló, imprimir los logs de los containers
          # para que el próximo run tenga contexto sin tener que SSH al host.
          for svc in api worker web db redis minio; do
            cname="prosell-staging-$svc"
            if docker ps -a --format '{{.Names}}' | grep -q "^${cname}$"; then
              echo "===== ${cname} (last 100 lines) ====="
              docker logs --tail 100 "$cname" 2>&1 || true
            fi
          done

      - name: Notify staging deploy done
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          DEPLOY_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "$WEBHOOK_URL" ]; then
            if [ "$DEPLOY_STATUS" = "success" ]; then
              MSG="✅ Staging deploy OK — revisá local, luego corré \"Promote to Production\" manual si querés promover."
            else
              MSG="❌ Staging deploy FAILED (status: $DEPLOY_STATUS). Revisá: $RUN_URL"
            fi
            curl -X POST "$WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"$MSG\"}" \
              || echo "⚠️ notify failed (non-fatal)"
          fi
