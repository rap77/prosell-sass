name: E2E Tests

# E2E suite requires Postgres + Redis + MinIO service containers plus a
# running uvicorn + Next.js dev server, which the standard PR CI doesn't
# provision. Moved out of ci.yml so PRs can merge without standing up the
# full backend/frontend stack on every push.
#
# Triggers:
#   - workflow_dispatch: manual run from the GitHub Actions UI
#   - schedule: weekly Sunday 02:00 UTC smoke pass — catches regressions
#     that slip past the unit/contract suites without blocking PRs
#
# When the team is ready to wire E2E into PR gating, add the service
# containers (postgres, redis, minio) plus a wait-for-health step and
# change `workflow_dispatch` to also include `pull_request`.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: |
          uv sync --all-extras
          pnpm install --frozen-lockfile
        working-directory: apps/api

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: tests/e2e

      # B1.1.39: Run smoke tests first for fast feedback (< 5 min target)
      - name: Run Smoke Tests (fast feedback)
        run: pnpm exec playwright test specs/smoke.spec.ts --reporter=list
        working-directory: tests/e2e
        env:
          CI: "true"
          SKIP_AUTH: "true"

      - name: Run E2E tests (full suite)
        run: pnpm test
        working-directory: tests/e2e
        env:
          CI: "true"
