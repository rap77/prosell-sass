name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras
        working-directory: apps/api

      - name: Run Ruff
        run: uv run ruff check src
        working-directory: apps/api

      - name: Run Ruff format check
        run: uv run ruff format --check src
        working-directory: apps/api

      - name: Type check with Pyright
        run: uv run pyright
        working-directory: apps/api

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    services:
      postgres-test:
        image: postgres:17
        env:
          POSTGRES_USER: prosell
          POSTGRES_PASSWORD: prosell_test_password
          POSTGRES_DB: prosell_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U prosell"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras
        working-directory: apps/api

      - name: Create integration test DB schema
        run: uv run python scripts/create_test_schema.py
        working-directory: apps/api

      - name: Run tests
        run: uv run pytest --cov=prosell_saas --cov-report=xml
        working-directory: apps/api

  lint-node:
    name: Lint Node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @prosell/web lint

      - name: Typecheck
        run: pnpm --filter @prosell/web typecheck

      - name: Format check
        run: pnpm format:check

  test-node:
    name: Test Node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter @prosell/web test:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-python, lint-node, test-python, test-node]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
