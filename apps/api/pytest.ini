[pytest]
# Pytest configuration for ProSell API

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Asyncio mode
asyncio_mode = auto
# Default loop scope for async fixtures. Without this, pytest-asyncio 0.24+
# creates a NEW event loop per test function. Session-scoped async fixtures
# (e.g. _session_engine in tests/integration/conftest.py) get bound to the
# FIRST function's loop, so connections created on that loop leak into later
# tests that run on fresh loops — yielding
# `RuntimeError: Task got Future ... attached to a different loop`.
# Pinning BOTH scopes to `session` makes the engine and the tests share one
# loop, eliminating the cross-loop Future error.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session

# Output options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (database, external APIs)
    e2e: End-to-end tests (full workflow)
    slow: Slow tests (mark for CI parallelization)
    auth: Authentication-related tests
    tenant: Multi-tenant tests

# Warnings
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Minversion
minversion = 8.3
