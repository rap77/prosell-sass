<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ProSell — Conectá tus canales</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: "";
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 50% 35% at 50% 0%, rgba(30,95,212,0.10), transparent 60%),
    radial-gradient(ellipse 40% 30% at 20% 100%, rgba(13,27,110,0.18), transparent 60%);
}

/* Top bar */
.topbar {
  position: sticky; top: 0; z-index: 10;
  background: rgba(6,13,36,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-subtle);
}
.topbar-inner {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  align-items: center;
  gap: 32px;
  max-width: 1200px;
  margin: 0 auto;
  padding: 18px 32px;
}
.tb-logo {
  display: inline-flex; align-items: center; gap: 10px;
  font-size: 17px; font-weight: 700;
  color: var(--text-primary);
  text-decoration: none;
}
.tb-logo img { height: 26px; width: auto; }

.tb-center {
  display: flex; flex-direction: column;
  align-items: center;
  gap: 8px;
  max-width: 520px;
  width: 100%;
  margin: 0 auto;
}
.tb-step-label {
  font-size: 13px;
  color: var(--text-secondary);
  white-space: nowrap;
}
.tb-step-label b { color: var(--cyan); font-weight: 600; }
.tb-progress {
  width: 100%; height: 4px;
  border-radius: 100px;
  background: rgba(77,184,255,0.10);
  overflow: hidden;
}
.tb-progress-fill {
  height: 100%; width: 66%;
  border-radius: 100px;
  background: linear-gradient(90deg, var(--cyan), var(--cyan-hover));
  box-shadow: 0 0 12px rgba(77,184,255,0.40);
}

.tb-skip {
  justify-self: end;
  font-size: 12px;
  color: var(--text-secondary);
  text-decoration: none;
  transition: color 180ms;
}
.tb-skip:hover { color: var(--cyan); }

/* Content */
.page {
  position: relative;
  z-index: 1;
  max-width: 880px;
  margin: 0 auto;
  padding: 56px 24px 130px;
  display: flex; flex-direction: column;
  gap: 28px;
}

.hero-icon {
  align-self: center;
  width: 72px; height: 72px;
  border-radius: 50%;
  background: rgba(77,184,255,0.08);
  border: 1px solid rgba(77,184,255,0.18);
  display: flex; align-items: center; justify-content: center;
  color: var(--cyan);
  position: relative;
}
.hero-icon::before {
  content: "";
  position: absolute; inset: -10px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(77,184,255,0.15), transparent 70%);
  z-index: -1;
}
.hero-icon [data-lucide] { width: 32px; height: 32px; stroke-width: 1.75; }

.head {
  text-align: center;
  display: flex; flex-direction: column; gap: 10px;
}
.head h1 {
  font-size: 32px; font-weight: 800;
  letter-spacing: -0.025em;
  line-height: 1.15;
  margin: 0;
  color: var(--text-primary);
}
.head p {
  font-size: 16px;
  line-height: 1.55;
  color: var(--text-secondary);
  max-width: 540px;
  margin: 0 auto;
}

/* Channel cards */
.channels {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.ch-card {
  position: relative;
  background: rgba(13,27,62,0.7);
  border: 1px solid rgba(77,184,255,0.12);
  border-radius: 14px;
  padding: 22px;
  display: flex; align-items: flex-start;
  gap: 16px;
  cursor: pointer;
  text-align: left;
  transition: border-color 180ms var(--ease-out), background 180ms, transform 180ms;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.ch-card:hover {
  border-color: rgba(77,184,255,0.3);
  transform: translateY(-2px);
}
.ch-card.selected {
  border: 2px solid var(--cyan);
  background: rgba(77,184,255,0.06);
  padding: 21px;
}
.ch-logo {
  flex-shrink: 0;
  width: 44px; height: 44px;
  border-radius: 12px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800;
  color: #fff;
  letter-spacing: -0.02em;
}
.ch-logo.fb { background: #1877F2; }
.ch-logo.at { background: #FF6600; }
.ch-logo.cars { background: #CC0000; }
.ch-logo.web { background: var(--navy); color: var(--cyan); }
.ch-logo.web [data-lucide] { width: 20px; height: 20px; stroke-width: 2; }

.ch-meta {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  gap: 4px;
}
.ch-name {
  font-size: 15px; font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}
.ch-desc {
  font-size: 12.5px;
  color: var(--text-secondary);
  line-height: 1.4;
}
.ch-status {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 10px;
  align-self: flex-start;
  padding: 5px 11px;
  border-radius: 100px;
  font-size: 12px; font-weight: 600;
  background: rgba(77,184,255,0.08);
  border: 1px solid rgba(77,184,255,0.2);
  color: var(--cyan);
  cursor: pointer;
  transition: all 180ms;
}
.ch-status:hover { background: rgba(77,184,255,0.16); }
.ch-status.connected {
  background: rgba(34,211,160,0.12);
  border-color: rgba(34,211,160,0.3);
  color: var(--success);
}
.ch-status [data-lucide] { width: 11px; height: 11px; stroke-width: 3; }

.ch-check {
  position: absolute;
  top: 14px; right: 14px;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--cyan);
  color: var(--bg-base);
  display: none;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 12px rgba(77,184,255,0.4);
}
.ch-card.selected .ch-check { display: inline-flex; }
.ch-check [data-lucide] { width: 12px; height: 12px; stroke-width: 3; }

/* Info box */
.info-box {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 16px;
  background: rgba(77,184,255,0.06);
  border: 1px solid rgba(77,184,255,0.12);
  border-radius: 8px;
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--text-secondary);
}
.info-box [data-lucide] {
  width: 16px; height: 16px;
  color: var(--cyan);
  stroke-width: 2;
  flex-shrink: 0; margin-top: 2px;
}
.info-box b { color: var(--text-primary); font-weight: 600; }

/* Bottom nav */
.botnav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(6,13,36,0.92);
  border-top: 1px solid var(--border-subtle);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 10;
}
.botnav-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 18px 32px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 16px;
  align-items: center;
}
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  height: 44px;
  padding: 0 22px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: 0;
  text-decoration: none;
  transition: all 180ms var(--ease-out);
}
.btn-ghost {
  background: transparent;
  border: 1px solid rgba(77,184,255,0.2);
  color: var(--text-primary);
  justify-self: start;
}
.btn-ghost:hover {
  border-color: var(--cyan);
  background: rgba(77,184,255,0.04);
}
.btn-primary {
  background: var(--cyan);
  color: var(--bg-base);
  justify-self: end;
  padding: 0 26px;
}
.btn-primary:hover {
  background: var(--cyan-hover);
  box-shadow: 0 8px 28px rgba(77,184,255,0.30);
  transform: translateY(-1px);
}
.btn [data-lucide] { width: 16px; height: 16px; stroke-width: 2.5; }
.botnav-note {
  font-size: 11px;
  color: var(--text-disabled);
  text-align: center;
}
.selected-count {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 500;
}
.selected-count .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 6px var(--success);
}
.selected-count b { color: var(--text-primary); }

@media (max-width: 760px) {
  .topbar-inner { grid-template-columns: auto 1fr; padding: 14px 18px; }
  .tb-skip { display: none; }
  .page { padding: 36px 18px 130px; }
  .channels { grid-template-columns: 1fr; }
  .head h1 { font-size: 26px; }
  .botnav-inner { grid-template-columns: 1fr 1fr; padding: 14px 18px; }
  .botnav-note { grid-column: 1 / -1; order: -1; }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a class="tb-logo" href="#">
      <img src="../assets/logo-mark.png" alt="" />
      <span>ProSell</span>
    </a>
    <div class="tb-center">
      <span class="tb-step-label"><b>Paso 2 de 3</b> · Conectá tus canales</span>
      <div class="tb-progress"><div class="tb-progress-fill"></div></div>
    </div>
    <a class="tb-skip" href="#">Saltar por ahora</a>
  </div>
</header>

<main class="page">
  <div class="hero-icon">
    <i data-lucide="share-2"></i>
  </div>

  <div class="head">
    <h1>¿Dónde querés publicar?</h1>
    <p>Seleccioná los canales activos para tu nicho. Podés agregar más después.</p>
  </div>

  <div class="channels">
    <!-- Facebook (selected) -->
    <button type="button" class="ch-card selected" data-channel="fb">
      <span class="ch-check"><i data-lucide="check"></i></span>
      <span class="ch-logo fb">f</span>
      <span class="ch-meta">
        <span class="ch-name">Facebook Marketplace</span>
        <span class="ch-desc">El canal con mayor volumen de leads</span>
        <span class="ch-status connected"><i data-lucide="check"></i>Conectado</span>
      </span>
    </button>

    <!-- AutoTrader (selected) -->
    <button type="button" class="ch-card selected" data-channel="at">
      <span class="ch-check"><i data-lucide="check"></i></span>
      <span class="ch-logo at">AT</span>
      <span class="ch-meta">
        <span class="ch-name">AutoTrader</span>
        <span class="ch-desc">Compradores de alta intención</span>
        <span class="ch-status connected"><i data-lucide="check"></i>Conectado</span>
      </span>
    </button>

    <!-- Cars.com -->
    <button type="button" class="ch-card" data-channel="cars">
      <span class="ch-check"><i data-lucide="check"></i></span>
      <span class="ch-logo cars">C</span>
      <span class="ch-meta">
        <span class="ch-name">Cars.com</span>
        <span class="ch-desc">Gran alcance en LATAM</span>
        <span class="ch-status">Conectar</span>
      </span>
    </button>

    <!-- Tu sitio web -->
    <button type="button" class="ch-card" data-channel="web">
      <span class="ch-check"><i data-lucide="check"></i></span>
      <span class="ch-logo web"><i data-lucide="globe"></i></span>
      <span class="ch-meta">
        <span class="ch-name">Tu sitio web</span>
        <span class="ch-desc">Widget embebible en tu web actual</span>
        <span class="ch-status">Configurar</span>
      </span>
    </button>
  </div>

  <div class="info-box">
    <i data-lucide="info"></i>
    <span><b>Tip:</b> Podés conectar más canales en cualquier momento desde Configuración → Canales.</span>
  </div>
</main>

<nav class="botnav">
  <div class="botnav-inner">
    <a class="btn btn-ghost" href="Onboarding Step 1.html">
      <i data-lucide="arrow-left"></i> Anterior
    </a>
    <span class="selected-count"><span class="dot"></span><b>2</b> canales seleccionados</span>
    <a class="btn btn-primary" href="#">
      Continuar <i data-lucide="arrow-right"></i>
    </a>
  </div>
</nav>

<script>
  lucide.createIcons();

  // Toggle selection
  document.querySelectorAll('.ch-card').forEach(card => {
    card.addEventListener('click', (e) => {
      // Don't toggle when clicking the inner status pill (it might have its own behavior)
      if (e.target.closest('.ch-status')) return;
      card.classList.toggle('selected');
      const status = card.querySelector('.ch-status');
      if (card.classList.contains('selected')) {
        status.classList.add('connected');
        status.innerHTML = '<i data-lucide="check"></i>Conectado';
      } else {
        status.classList.remove('connected');
        status.textContent = card.dataset.channel === 'web' ? 'Configurar' : 'Conectar';
      }
      lucide.createIcons();

      // Update count
      const n = document.querySelectorAll('.ch-card.selected').length;
      document.querySelector('.selected-count b').textContent = n;
    });
  });
</script>
</body>
</html>
