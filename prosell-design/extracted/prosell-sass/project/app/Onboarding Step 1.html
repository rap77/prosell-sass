<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ProSell — Cargá tu primer producto</title>
    <link rel="stylesheet" href="../colors_and_type.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg-base);
        color: var(--text-primary);
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(
            ellipse 50% 35% at 50% 0%,
            rgba(30, 95, 212, 0.1),
            transparent 60%
          ),
          radial-gradient(
            ellipse 40% 30% at 20% 100%,
            rgba(13, 27, 110, 0.18),
            transparent 60%
          );
      }

      /* ===================== Top bar ===================== */
      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(6, 13, 36, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border-subtle);
      }
      .topbar-inner {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: center;
        gap: 32px;
        max-width: 1200px;
        margin: 0 auto;
        padding: 18px 32px;
      }
      .tb-logo {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: var(--text-primary);
        text-decoration: none;
      }
      .tb-logo img {
        height: 26px;
        width: auto;
      }

      .tb-center {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        max-width: 520px;
        width: 100%;
        margin: 0 auto;
      }
      .tb-step-label {
        font-size: 13px;
        color: var(--text-secondary);
        white-space: nowrap;
      }
      .tb-step-label b {
        color: var(--cyan);
        font-weight: 600;
      }
      .tb-progress {
        width: 100%;
        height: 4px;
        border-radius: 100px;
        background: rgba(77, 184, 255, 0.1);
        overflow: hidden;
      }
      .tb-progress-fill {
        height: 100%;
        width: 33%;
        border-radius: 100px;
        background: linear-gradient(90deg, var(--cyan), var(--cyan-hover));
        box-shadow: 0 0 12px rgba(77, 184, 255, 0.4);
        transition: width 220ms var(--ease-out);
      }

      .tb-skip {
        justify-self: end;
        font-size: 12px;
        color: var(--text-secondary);
        text-decoration: none;
        transition: color 180ms;
      }
      .tb-skip:hover {
        color: var(--cyan);
      }

      /* ===================== Content ===================== */
      .page {
        position: relative;
        z-index: 1;
        max-width: 640px;
        margin: 0 auto;
        padding: 56px 24px 120px;
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      .hero-icon {
        align-self: center;
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: rgba(77, 184, 255, 0.08);
        border: 1px solid rgba(77, 184, 255, 0.18);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--cyan);
        position: relative;
      }
      .hero-icon::before {
        content: "";
        position: absolute;
        inset: -10px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(77, 184, 255, 0.15),
          transparent 70%
        );
        z-index: -1;
      }
      .hero-icon [data-lucide] {
        width: 32px;
        height: 32px;
        stroke-width: 1.75;
      }

      .head {
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .head h1 {
        font-size: 32px;
        font-weight: 800;
        letter-spacing: -0.025em;
        line-height: 1.15;
        margin: 0;
        color: var(--text-primary);
      }
      .head p {
        font-size: 16px;
        line-height: 1.55;
        color: var(--text-secondary);
        max-width: 480px;
        margin: 0 auto;
      }

      .form-card {
        background: rgba(13, 27, 62, 0.7);
        border: 1px solid rgba(77, 184, 255, 0.12);
        border-radius: 16px;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        padding: 32px;
        display: flex;
        flex-direction: column;
        gap: 22px;
        box-shadow: var(--shadow-md);
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .field-label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-secondary);
        letter-spacing: -0.005em;
      }
      .field-input {
        position: relative;
        display: flex;
        align-items: center;
      }
      .field-input input,
      .field-input textarea {
        width: 100%;
        background: rgba(6, 13, 36, 0.6);
        border: 1px solid rgba(77, 184, 255, 0.15);
        border-radius: 8px;
        color: var(--text-primary);
        font-family: inherit;
        font-size: 15px;
        outline: none;
        transition:
          border-color 180ms var(--ease-out),
          box-shadow 180ms var(--ease-out),
          background 180ms var(--ease-out);
        -webkit-appearance: none;
        appearance: none;
      }
      .field-input input {
        height: 44px;
        padding: 0 14px;
      }
      .field-input textarea {
        padding: 12px 14px;
        resize: vertical;
        min-height: 88px;
        line-height: 1.5;
        font-family: inherit;
      }
      .field-input input::placeholder,
      .field-input textarea::placeholder {
        color: var(--text-disabled);
      }
      .field-input input:focus,
      .field-input textarea:focus {
        border-color: var(--cyan);
        box-shadow: 0 0 0 3px rgba(77, 184, 255, 0.1);
        background: rgba(6, 13, 36, 0.85);
      }

      /* Price field */
      .field.price .prefix {
        position: absolute;
        left: 14px;
        font-size: 15px;
        font-weight: 600;
        color: var(--text-secondary);
        pointer-events: none;
      }
      .field.price input {
        padding-left: 30px;
        font-family: var(--font-mono);
      }

      /* Upload zone */
      .upload {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 32px 20px;
        border: 1.5px dashed rgba(77, 184, 255, 0.25);
        background: rgba(6, 13, 36, 0.4);
        border-radius: 12px;
        cursor: pointer;
        transition:
          border-color 180ms,
          background 180ms;
        text-align: center;
      }
      .upload:hover {
        border-color: var(--cyan);
        background: rgba(77, 184, 255, 0.05);
      }
      .upload .ico {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(77, 184, 255, 0.1);
        color: var(--cyan);
        margin-bottom: 4px;
      }
      .upload .ico [data-lucide] {
        width: 24px;
        height: 24px;
        stroke-width: 1.75;
      }
      .upload .main {
        font-size: 15px;
        color: var(--text-primary);
        font-weight: 500;
      }
      .upload .main b {
        color: var(--cyan);
        font-weight: 600;
      }
      .upload .sub {
        font-size: 12.5px;
        color: var(--text-secondary);
      }

      .thumbs {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .thumb {
        position: relative;
        width: 80px;
        height: 80px;
        border-radius: 10px;
        background:
          linear-gradient(
            135deg,
            rgba(77, 184, 255, 0.15),
            rgba(30, 95, 212, 0.2)
          ),
          repeating-linear-gradient(
            45deg,
            rgba(255, 255, 255, 0.04) 0 4px,
            transparent 4px 8px
          );
        border: 1px solid rgba(77, 184, 255, 0.18);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        overflow: hidden;
      }
      .thumb [data-lucide].photo {
        width: 22px;
        height: 22px;
        stroke-width: 1.5;
        opacity: 0.6;
      }
      .thumb .badge {
        position: absolute;
        top: 6px;
        right: 6px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--cyan);
        color: var(--bg-base);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 8px rgba(6, 13, 36, 0.6);
      }
      .thumb .badge [data-lucide] {
        width: 11px;
        height: 11px;
        stroke-width: 3;
      }
      .thumb-add {
        width: 80px;
        height: 80px;
        border-radius: 10px;
        border: 1.5px dashed rgba(77, 184, 255, 0.22);
        background: rgba(6, 13, 36, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 180ms;
      }
      .thumb-add:hover {
        border-color: var(--cyan);
        color: var(--cyan);
      }
      .thumb-add [data-lucide] {
        width: 20px;
        height: 20px;
        stroke-width: 2;
      }

      /* ===================== Bottom nav ===================== */
      .botnav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(6, 13, 36, 0.92);
        border-top: 1px solid var(--border-subtle);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        z-index: 10;
      }
      .botnav-inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 18px 32px;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 16px;
        align-items: center;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        height: 44px;
        padding: 0 22px;
        border-radius: 8px;
        font-family: inherit;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        border: 0;
        text-decoration: none;
        transition: all 180ms var(--ease-out);
      }
      .btn-ghost {
        background: transparent;
        border: 1px solid rgba(77, 184, 255, 0.2);
        color: var(--text-primary);
        justify-self: start;
      }
      .btn-ghost:hover {
        border-color: var(--cyan);
      }
      .btn-ghost[disabled],
      .btn-ghost.disabled {
        opacity: 0.4;
        cursor: not-allowed;
        pointer-events: none;
        color: var(--text-disabled);
        border-color: var(--border-subtle);
      }
      .btn-primary {
        background: var(--cyan);
        color: var(--bg-base);
        justify-self: end;
        padding: 0 26px;
      }
      .btn-primary:hover {
        background: var(--cyan-hover);
        box-shadow: 0 8px 28px rgba(77, 184, 255, 0.3);
        transform: translateY(-1px);
      }
      .btn [data-lucide] {
        width: 16px;
        height: 16px;
        stroke-width: 2.5;
      }

      .botnav-note {
        font-size: 11px;
        color: var(--text-disabled);
        text-align: center;
      }

      @media (max-width: 760px) {
        .topbar-inner {
          grid-template-columns: auto 1fr;
          padding: 14px 18px;
        }
        .tb-skip {
          display: none;
        }
        .page {
          padding: 36px 18px 130px;
        }
        .form-card {
          padding: 22px;
        }
        .head h1 {
          font-size: 26px;
        }
        .botnav-inner {
          grid-template-columns: 1fr 1fr;
          padding: 14px 18px;
        }
        .botnav-note {
          grid-column: 1 / -1;
          order: -1;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="tb-logo" href="#">
          <img src="../assets/logo-mark.png" alt="" />
          <span>ProSell</span>
        </a>
        <div class="tb-center">
          <span class="tb-step-label"
            ><b>Paso 1 de 3</b> · Cargá tu primer producto</span
          >
          <div class="tb-progress"><div class="tb-progress-fill"></div></div>
        </div>
        <a class="tb-skip" href="#">Saltar por ahora</a>
      </div>
    </header>

    <main class="page">
      <div class="hero-icon">
        <i data-lucide="package"></i>
      </div>

      <div class="head">
        <h1>Cargá tu primer producto</h1>
        <p>
          Solo necesitás lo básico para empezar. Podés completar los detalles
          después.
        </p>
      </div>

      <form class="form-card" novalidate>
        <div class="field">
          <label class="field-label" for="title">Título del producto</label>
          <div class="field-input">
            <input
              type="text"
              id="title"
              placeholder="Ej: Toyota Corolla 2024 — 45.000 km"
            />
          </div>
        </div>

        <div class="field price">
          <label class="field-label" for="price">Precio</label>
          <div class="field-input">
            <span class="prefix">$</span>
            <input
              type="text"
              id="price"
              inputmode="numeric"
              placeholder="28.500"
            />
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="desc">Descripción breve</label>
          <div class="field-input">
            <textarea
              id="desc"
              rows="3"
              placeholder="Describí las características principales..."
            ></textarea>
          </div>
        </div>

        <div class="field">
          <label class="field-label">Fotos del producto</label>
          <label class="upload" for="file-input">
            <span class="ico"><i data-lucide="upload-cloud"></i></span>
            <span class="main"
              >Arrastrá fotos o <b>hacé clic para subir</b></span
            >
            <span class="sub">JPG, PNG hasta 10MB · Máximo 20 fotos</span>
            <input
              id="file-input"
              type="file"
              accept="image/*"
              multiple
              style="display: none"
            />
          </label>

          <div class="thumbs" style="margin-top: 14px">
            <div class="thumb">
              <i data-lucide="image" class="photo"></i>
              <span class="badge"><i data-lucide="check"></i></span>
            </div>
            <div class="thumb">
              <i data-lucide="image" class="photo"></i>
              <span class="badge"><i data-lucide="check"></i></span>
            </div>
            <div class="thumb">
              <i data-lucide="image" class="photo"></i>
              <span class="badge"><i data-lucide="check"></i></span>
            </div>
            <div class="thumb-add" title="Agregar más">
              <i data-lucide="plus"></i>
            </div>
          </div>
        </div>
      </form>
    </main>

    <nav class="botnav">
      <div class="botnav-inner">
        <a class="btn btn-ghost disabled" aria-disabled="true">
          <i data-lucide="arrow-left"></i> Anterior
        </a>
        <span class="botnav-note"
          >Podés editar esto después desde Publicaciones</span
        >
        <a class="btn btn-primary" href="#">
          Continuar <i data-lucide="arrow-right"></i>
        </a>
      </div>
    </nav>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
