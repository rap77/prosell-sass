  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

:           #4DB8FF;\n  --cyan-hover:     #7DCEFF;\n\n  /* ---------- Color: Text ---------- */\n  --text-primary:   #F0F4FF;\n  --text-secondary: #8A9BBF;\n  --text-disabled:  #3D4F72;\n\n  /* ---------- Color: Status ---------- */\n  --success:        #22D3A0;\n  --warning:        #F5A623;\n  --error:          #F04438;\n\n  /* Status background tints (12% opacity for badges) */\n  --success-bg:     rgba(34, 211, 160, 0.12);\n  --warning-bg:     rgba(245, 166, 35, 0.12);\n  --error-bg:       rgba(240, 68, 56, 0.12);\n  --info-bg:        rgba(77, 184, 255, 0.12);\n\n  /* ---------- Borders ---------- */\n  --border-subtle:  rgba(77, 184, 255, 0.10);\n  --border-default: rgba(77, 184, 255, 0.15);\n  --border-strong:  rgba(77, 184, 255, 0.30);\n  --border-active:  #4DB8FF;\n\n  /* ---------- Gradients ---------- */\n  --gradient-hero:    linear-gradient(135deg, #060D24 0%, #0D1B6E 50%, #1E5FD4 100%);\n  --gradient-glow:    radial-gradient(ellipse at 70% 20%, rgba(30, 95, 212, 0.18), transparent 60%);\n  --gradient-cta:     linear-gradient(135deg, #4DB8FF, #1E5FD4);\n  --gradient-text:    linear-gradient(135deg, #4DB8FF, #1E5FD4);\n\n  /* ---------- Shadows / Elevation ---------- */\n  --shadow-sm:    0 2px 8px rgba(6, 13, 36, 0.4);\n  --shadow-md:    0 8px 24px rgba(6, 13, 36, 0.5);\n  --shadow-lg:    0 16px 48px rgba(6, 13, 36, 0.55);\n  --shadow-xl:    0 32px 80px rgba(6, 13, 36, 0.6);\n  --shadow-glow-cyan: 0 8px 32px rgba(77, 184, 255, 0.35);\n  --shadow-glow-blue: 0 8px 32px rgba(30, 95, 212, 0.4);\n  --shadow-inset-top: inset 0 1px 0 rgba(255, 255, 255, 0.06);\n\n  /* ---------- Radii ---------- */\n  --radius-xs:    4px;\n  --radius-sm:    6px;\n  --radius-md:    8px;\n  --radius-lg:    12px;\n  --radius-xl:    16px;\n  --radius-2xl:   24px;\n  --radius-pill:  100px;\n\n  /* ---------- Spacing (4px base) ---------- */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n  --space-24: 96px;\n\n  /* ---------- Typography: families ---------- */\n  --font-sans: \"Inter\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;\n  --font-mono: \"JetBrains Mono\", \"SF Mono\", Menlo, Consolas, monospace;\n\n  /* ---------- Typography: scale ---------- */\n  --fs-hero:   64px;\n  --fs-h1:     48px;\n  --fs-h2:     36px;\n  --fs-h3:     24px;\n  --fs-h4:     18px;\n  --fs-body-lg: 18px;\n  --fs-body:   16px;\n  --fs-small:  14px;\n  --fs-xs:     12px;\n\n  /* ---------- Typography: weights ---------- */\n  --fw-regular:  400;\n  --fw-medium:   500;\n  --fw-semibold: 600;\n  --fw-bold:     700;\n  --fw-black:    800;\n\n  /* ---------- Motion ---------- */\n  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);\n  --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);\n  --dur-fast:    120ms;\n  --dur-base:    200ms;\n  --dur-slow:    320ms;\n}\n\n/* ============================================================\n   Semantic typography classes\n   ============================================================ */\n\n.ds-hero {\n  font-family: var(--font-sans);\n  font-size: var(--fs-hero);\n  font-weight: var(--fw-black);\n  line-height: 1.05;\n  letter-spacing: -0.03em;\n  color: var(--text-primary);\n}\n\n.ds-h1 {\n  font-family: var(--font-sans);\n  font-size: var(--fs-h1);\n  font-weight: var(--fw-bold);\n  line-height: 1.1;\n  letter-spacing: -0.025em;\n  color: var(--text-primary);\n}\n\n.ds-h2 {\n  font-family: var(--font-sans);\n  font-size: var(--fs-h2);\n  font-weight: var(--fw-semibold);\n  line-height: 1.15;\n  letter-spacing: -0.02em;\n  color: var(--text-primary);\n}\n\n.ds-h3 {\n  font-family: var(--font-sans);\n  font-size: var(--fs-h3);\n  font-weight: var(--fw-semibold);\n  line-height: 1.25;\n  letter-spacing: -0.015em;\n  color: var(--text-primary);\n}\n\n.ds-h4 {\n  font-family: var(--font-sans);\n  font-size: var(--fs-h4);\n  font-weight: var(--fw-semibold);\n  line-height: 1.35;\n  letter-spacing: -0.01em;\n  color: var(--text-primary);\n}\n\n.ds-body-lg {\n  font-family: var(--font-sans);\n  font-size: var(--fs-body-lg);\n  font-weight: var(--fw-regular);\n  line-height: 1.6;\n  color: var(--text-primary);\n}\n\n.ds-body {\n  font-family: var(--font-sans);\n  font-size: var(--fs-body);\n  font-weight: var(--fw-regular);\n  line-height: 1.6;\n  color: var(--text-primary);\n}\n\n.ds-small {\n  font-family: var(--font-sans);\n  font-size: var(--fs-small);\n  font-weight: var(--fw-regular);\n  line-height: 1.5;\n  color: var(--text-secondary);\n}\n\n.ds-xs {\n  font-family: var(--font-sans);\n  font-size: var(--fs-xs);\n  font-weight: var(--fw-medium);\n  line-height: 1.4;\n  letter-spacing: 0.01em;\n  color: var(--text-secondary);\n}\n\n.ds-eyebrow {\n  font-family: var(--font-sans);\n  font-size: var(--fs-xs);\n  font-weight: var(--fw-semibold);\n  line-height: 1.4;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--cyan);\n}\n\n.ds-mono {\n  font-family: var(--font-mono);\n  font-size: var(--fs-small);\n  font-weight: var(--fw-regular);\n  color: var(--text-secondary);\n}\n\n/* Gradient text (for CTA-style flourishes) */\n.ds-text-gradient {\n  background: var(--gradient-text);\n  -webkit-background-clip: text;\n  background-clip: text;\n  -webkit-text-fill-color: transparent;\n  color: transparent;\n}\n\n/* ============================================================\n   Base reset for ProSell surfaces\n   ============================================================ */\n\n.ds-surface-base {\n  background: var(--bg-base);\n  color: var(--text-primary);\n  font-family: var(--font-sans);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n<\u002Fstyle>\n<script src=\"19652617-f6dd-4d99-b233-0c8916ad0693\"><\u002Fscript>\n\n<style>\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  background: var(--bg-base);\n  color: var(--text-primary);\n  font-family: var(--font-sans);\n  -webkit-font-smoothing: antialiased;\n  height: 100vh;\n  overflow: hidden;\n}\na { color: inherit; text-decoration: none; }\n\n/* ===== App shell ===== */\n.app { display: grid; grid-template-columns: 240px 1fr; height: 100vh; }\n\n/* ===== Sidebar (shared) ===== */\n.sidebar {\n  background: #040A1A;\n  border-right: 1px solid rgba(77,184,255,0.06);\n  display: flex; flex-direction: column;\n  padding: 20px 0 16px;\n  height: 100vh;\n}\n.sb-top { padding: 0 16px 16px; border-bottom: 1px solid rgba(77,184,255,0.06); display: flex; flex-direction: column; gap: 14px; }\n.sb-logo { display: inline-flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 700; color: var(--text-primary); }\n.sb-logo img { height: 26px; width: auto; }\n.workspace { display: flex; align-items: center; gap: 6px; width: 100%; padding: 6px 10px; background: rgba(77,184,255,0.06); border: 1px solid var(--border-subtle); border-radius: 6px; font-size: 13px; color: var(--text-secondary); cursor: pointer; }\n.workspace span { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: left; }\n.workspace [data-lucide] { width: 14px; height: 14px; stroke-width: 2; }\n.sb-nav { flex: 1; display: flex; flex-direction: column; padding: 16px 8px; gap: 2px; }\n.sb-nav .group-divider { height: 1px; background: rgba(77,184,255,0.06); margin: 12px 8px; }\n.nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 8px; color: var(--text-secondary); font-size: 14px; font-weight: 500; transition: background 180ms, color 180ms; }\n.nav-item:hover { background: rgba(255,255,255,0.03); color: var(--text-primary); }\n.nav-item [data-lucide] { width: 18px; height: 18px; stroke-width: 2; }\n.nav-item .label { flex: 1; }\n.nav-item .badge { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 100px; background: rgba(77,184,255,0.14); color: var(--cyan); }\n.nav-item.active { background: rgba(77,184,255,0.08); color: var(--text-primary); font-weight: 600; border-right: 2px solid var(--cyan); border-radius: 8px 0 0 8px; }\n.nav-item.active [data-lucide] { color: var(--cyan); }\n.sb-user { display: flex; align-items: center; gap: 10px; margin: 0 12px; padding: 10px 12px; background: rgba(13,27,62,0.6); border: 1px solid var(--border-subtle); border-radius: 10px; cursor: pointer; }\n.sb-user .av { width: 32px; height: 32px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--bg-base); background: linear-gradient(135deg, #4DB8FF, #1E5FD4); }\n.sb-user .meta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }\n.sb-user .meta b { font-size: 13px; font-weight: 600; }\n.sb-user .plan { display: inline-flex; align-self: flex-start; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 100px; background: rgba(77,184,255,0.14); color: var(--cyan); letter-spacing: 0.04em; text-transform: uppercase; }\n.sb-user [data-lucide] { width: 14px; height: 14px; color: var(--text-secondary); }\n\n/* ===== Settings layout ===== */\n.settings {\n  display: grid;\n  grid-template-columns: 220px 1fr;\n  height: 100vh;\n  overflow: hidden;\n}\n\n/* Settings sub-nav */\n.subnav {\n  background: #060D1E;\n  border-right: 1px solid rgba(77,184,255,0.06);\n  padding: 24px 12px;\n  display: flex; flex-direction: column;\n  gap: 8px;\n  height: 100vh;\n  overflow-y: auto;\n}\n.subnav .heading {\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--text-disabled);\n  padding: 0 12px 6px;\n}\n.sub-item {\n  display: flex; align-items: center;\n  gap: 10px;\n  padding: 9px 12px;\n  border-radius: 6px;\n  color: var(--text-secondary);\n  font-size: 13px;\n  font-weight: 500;\n  cursor: pointer;\n  transition: all 180ms;\n}\n.sub-item [data-lucide] { width: 15px; height: 15px; stroke-width: 2; flex-shrink: 0; }\n.sub-item:hover { color: var(--text-primary); background: rgba(255,255,255,0.02); }\n.sub-item.active {\n  background: rgba(77,184,255,0.08);\n  color: var(--text-primary);\n  font-weight: 600;\n}\n.sub-item.active [data-lucide] { color: var(--cyan); }\n\n/* ===== Content ===== */\n.content {\n  overflow-y: auto;\n  padding: 36px 40px 60px;\n  display: flex; flex-direction: column;\n  gap: 36px;\n}\n.content > * { flex-shrink: 0; }\n.content > .head {\n  display: flex; flex-direction: column;\n  gap: 4px;\n  max-width: 720px;\n}\n.content > .head h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.015em; margin: 0; }\n.content > .head p { font-size: 13px; color: var(--text-secondary); margin: 0; }\n\n/* ===== Section ===== */\n.section {\n  display: flex; flex-direction: column;\n  gap: 18px;\n  max-width: 720px;\n}\n.section .label {\n  display: flex; align-items: center; gap: 12px;\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--text-disabled);\n}\n.section .label::after {\n  content: \"\";\n  flex: 1;\n  height: 1px;\n  background: var(--border-subtle);\n}\n.section.danger .label { color: var(--error); }\n.section.danger .label::after { background: rgba(240,68,56,0.15); }\n\n/* ===== Avatar block ===== */\n.avatar-block {\n  display: flex; flex-direction: column;\n  align-items: center;\n  gap: 4px;\n  padding: 8px 0 4px;\n}\n.avatar {\n  position: relative;\n  width: 96px; height: 96px;\n  border-radius: 50%;\n  background: linear-gradient(135deg, #0D1B6E 0%, #1E5FD4 100%);\n  display: inline-flex; align-items: center; justify-content: center;\n  color: #fff;\n  font-size: 32px;\n  font-weight: 700;\n  letter-spacing: 0.02em;\n  box-shadow: 0 12px 32px rgba(30,95,212,0.35), inset 0 1px 0 rgba(255,255,255,0.10);\n  cursor: pointer;\n  transition: transform 220ms var(--ease-out);\n}\n.avatar::after {\n  content: \"\";\n  position: absolute;\n  inset: -6px;\n  border-radius: 50%;\n  background: radial-gradient(circle, rgba(77,184,255,0.20), transparent 65%);\n  z-index: -1;\n  opacity: 0;\n  transition: opacity 220ms;\n}\n.avatar:hover { transform: scale(1.02); }\n.avatar:hover::after { opacity: 1; }\n.avatar .cam {\n  position: absolute;\n  inset: 0;\n  border-radius: 50%;\n  background: rgba(6,13,36,0.65);\n  backdrop-filter: blur(4px);\n  -webkit-backdrop-filter: blur(4px);\n  display: inline-flex; align-items: center; justify-content: center;\n  color: #fff;\n  opacity: 0;\n  transition: opacity 200ms var(--ease-out);\n}\n.avatar:hover .cam { opacity: 1; }\n.avatar .cam [data-lucide] { width: 26px; height: 26px; stroke-width: 1.75; }\n\n.avatar-link {\n  font-size: 12px;\n  font-weight: 600;\n  color: var(--cyan);\n  cursor: pointer;\n  margin-top: 6px;\n  letter-spacing: -0.005em;\n  transition: color 180ms;\n}\n.avatar-link:hover { color: var(--cyan-hover); }\n.avatar-name {\n  font-size: 18px;\n  font-weight: 700;\n  letter-spacing: -0.015em;\n  color: var(--text-primary);\n  margin-top: 8px;\n}\n.avatar-role {\n  font-size: 13px;\n  color: var(--text-secondary);\n  display: inline-flex; align-items: center; gap: 8px;\n}\n.avatar-role .role-tag {\n  font-size: 10px;\n  font-weight: 700;\n  padding: 2px 8px;\n  border-radius: 100px;\n  background: rgba(245,166,35,0.12);\n  color: var(--warning);\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n}\n.avatar-role .dot { color: var(--text-disabled); }\n\n/* ===== Form ===== */\n.form {\n  display: flex; flex-direction: column;\n  gap: 18px;\n  max-width: 560px;\n}\n.form-row {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 14px;\n}\n.field { display: flex; flex-direction: column; gap: 6px; }\n.field label { font-size: 12.5px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.005em; }\n.field .hint { font-size: 11.5px; color: var(--text-disabled); }\n.field .input-wrap {\n  position: relative;\n  display: flex; align-items: center;\n}\n.input, .select {\n  height: 38px;\n  padding: 0 12px;\n  background: rgba(13,27,62,0.7);\n  border: 1px solid var(--border-default);\n  border-radius: 8px;\n  color: var(--text-primary);\n  font-family: inherit;\n  font-size: 13.5px;\n  font-weight: 500;\n  outline: none;\n  transition: border-color 180ms, box-shadow 180ms;\n  width: 100%;\n}\n.input::placeholder { color: var(--text-disabled); }\n.input:focus, .select:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(77,184,255,0.08); }\n.input:read-only, .input.readonly {\n  color: var(--text-secondary);\n  background: rgba(13,27,62,0.4);\n  border-color: var(--border-subtle);\n  cursor: not-allowed;\n}\n.input:read-only:focus { border-color: var(--border-subtle); box-shadow: none; }\n.input-wrap .lock {\n  position: absolute;\n  right: 12px;\n  width: 14px; height: 14px;\n  color: var(--text-disabled);\n  pointer-events: none;\n}\n.input-wrap.has-lock .input { padding-right: 36px; }\n\n.select {\n  appearance: none;\n  background-image: linear-gradient(45deg, transparent 50%, var(--text-secondary) 50%),\n                    linear-gradient(135deg, var(--text-secondary) 50%, transparent 50%);\n  background-position: calc(100% - 14px) 50%, calc(100% - 10px) 50%;\n  background-size: 4px 4px, 4px 4px;\n  background-repeat: no-repeat;\n  padding-right: 28px;\n}\n\n/* ===== Save row ===== */\n.save-row {\n  display: flex; align-items: center; justify-content: flex-end;\n  gap: 10px;\n  padding-top: 6px;\n}\n.btn {\n  display: inline-flex; align-items: center; gap: 8px;\n  height: 38px;\n  padding: 0 16px;\n  border-radius: 8px;\n  font-family: inherit;\n  font-size: 13px;\n  font-weight: 600;\n  cursor: pointer;\n  border: 1px solid transparent;\n  background: transparent;\n  transition: all 180ms;\n}\n.btn [data-lucide] { width: 14px; height: 14px; stroke-width: 2.5; }\n.btn-ghost { border-color: var(--border-default); color: var(--text-secondary); }\n.btn-ghost:hover { border-color: var(--cyan); color: var(--text-primary); }\n.btn-primary { background: var(--cyan); color: var(--bg-base); }\n.btn-primary:hover { background: var(--cyan-hover); box-shadow: 0 6px 20px rgba(77,184,255,0.3); }\n\n/* ===== Segmented control ===== */\n.segmented {\n  display: inline-flex;\n  background: rgba(13,27,62,0.6);\n  border: 1px solid var(--border-default);\n  border-radius: 8px;\n  padding: 3px;\n}\n.segmented button {\n  background: transparent;\n  border: 0;\n  color: var(--text-secondary);\n  padding: 6px 14px;\n  font-family: inherit;\n  font-size: 12.5px;\n  font-weight: 500;\n  cursor: pointer;\n  border-radius: 6px;\n  transition: all 180ms;\n  display: inline-flex; align-items: center; gap: 6px;\n}\n.segmented button:hover { color: var(--text-primary); }\n.segmented button.on {\n  background: rgba(77,184,255,0.14);\n  color: var(--cyan);\n  font-weight: 600;\n}\n.segmented button [data-lucide],\n.segmented button svg { display: none; width: 12px; height: 12px; stroke-width: 3; }\n.segmented button.on [data-lucide],\n.segmented button.on svg { display: inline-block; }\n\n/* ===== Toggle rows ===== */\n.toggle-list { display: flex; flex-direction: column; gap: 4px; }\n.toggle-row {\n  display: grid;\n  grid-template-columns: 1fr auto;\n  gap: 16px;\n  align-items: center;\n  padding: 18px 0;\n  border-bottom: 1px solid var(--border-subtle);\n}\n.toggle-row:last-child { border-bottom: 0; }\n.toggle-text { display: flex; flex-direction: column; gap: 4px; }\n.toggle-text .lbl { font-size: 14px; font-weight: 600; color: var(--text-primary); }\n.toggle-text .desc { font-size: 12.5px; color: var(--text-secondary); line-height: 1.45; }\n\n/* Switch */\n.switch {\n  position: relative;\n  width: 38px; height: 22px;\n  border-radius: 100px;\n  background: rgba(61,79,114,0.6);\n  border: 1px solid var(--border-subtle);\n  cursor: pointer;\n  flex-shrink: 0;\n  transition: background 180ms, border-color 180ms;\n}\n.switch::after {\n  content: \"\";\n  position: absolute;\n  top: 50%; left: 2px;\n  transform: translateY(-50%);\n  width: 16px; height: 16px;\n  border-radius: 50%;\n  background: var(--text-secondary);\n  transition: all 200ms var(--ease-out);\n}\n.switch.on { background: var(--cyan); border-color: var(--cyan); box-shadow: 0 0 12px rgba(77,184,255,0.35); }\n.switch.on::after { left: 18px; background: var(--bg-base); }\n\n/* ===== Danger zone ===== */\n.danger-box {\n  background: rgba(240,68,56,0.04);\n  border: 1px solid rgba(240,68,56,0.12);\n  border-radius: 10px;\n  padding: 20px;\n  display: grid;\n  grid-template-columns: 1fr auto;\n  gap: 20px;\n  align-items: center;\n}\n.danger-box .txt { display: flex; flex-direction: column; gap: 4px; }\n.danger-box .ttl {\n  font-size: 14px;\n  font-weight: 600;\n  color: var(--text-primary);\n  letter-spacing: -0.005em;\n}\n.danger-box .sub {\n  font-size: 13px;\n  color: var(--text-secondary);\n  line-height: 1.5;\n  max-width: 440px;\n}\n.btn-danger {\n  display: inline-flex; align-items: center; gap: 8px;\n  height: 38px;\n  padding: 0 16px;\n  border-radius: 8px;\n  background: transparent;\n  color: var(--error);\n  border: 1px solid rgba(240,68,56,0.40);\n  font-family: inherit;\n  font-size: 13px;\n  font-weight: 600;\n  cursor: pointer;\n  transition: all 180ms;\n  flex-shrink: 0;\n  white-space: nowrap;\n}\n.btn-danger:hover {\n  background: rgba(240,68,56,0.10);\n  border-color: var(--error);\n  box-shadow: 0 6px 20px rgba(240,68,56,0.18);\n}\n.btn-danger [data-lucide] { width: 14px; height: 14px; stroke-width: 2.5; }\n\n/* Responsive */\n@media (max-width: 980px) {\n  .settings { grid-template-columns: 64px 1fr; }\n  .subnav { padding: 24px 6px; }\n  .subnav .heading { display: none; }\n  .sub-item { justify-content: center; padding: 10px; gap: 0; }\n  .sub-item .lbl-text { display: none; }\n}\n@media (max-width: 720px) {\n  .app { grid-template-columns: 1fr; }\n  .sidebar { display: none; }\n  .content { padding: 24px 18px 40px; }\n  .form-row { grid-template-columns: 1fr; }\n  .dange 002Fspan><\u002Fspan>\n      <i data-lucide=\"chevron-right\"><\u002Fi>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- Settings sub-layout -->\n  <div class=\"settings\">\n    <!-- Sub-nav -->\n    <aside class=\"subnav\">\n      <div class=\"heading\">Configuración<\u002Fdiv>\n      <a class=\"sub-item\" href=\"Settings General.html\"><i data-lucide=\"settings\"><\u002Fi><span class=\"lbl-text\">General<\u002Fspan><\u002Fa>\n      <a class=\"sub-item active\" href=\"#\"><i data-lucide=\"user\"><\u002Fi><span class=\"lbl-text\">Perfil<\u002Fspan><\u002Fa>\n      <a class=\"sub-item\" href=\"Settings Canales.html\"><i data-lucide=\"radio-tower\"><\u002Fi><span class=\"lbl-text\">Canales<\u002Fspan><\u002Fa>\n      <a class=\"sub-item\" href=\"Settings Equipo.html\"><i data-lucide=\"users\"><\u002Fi><span class=\"lbl-text\">Equipo<\u002Fspan><\u002Fa>\n      <a class=\"sub-item\" href=\"Settings Plan y Billing.html\"><i data-lucide=\"credit-card\"><\u002Fi><span class=\"lbl-text\">Plan y Billing<\u002Fspan><\u002Fa>\n      <a class=\"sub-item\" href=\"#\"><i data-lucide=\"bell\"><\u002Fi><span class=\"lbl-text\">Notificaciones<\u002Fspan><\u002Fa>\n      <a class=\"sub-item\" href=\"#\"><i data-lucide=\"shield-check\"><\u002Fi><span class=\"lbl-text\">Seguridad<\u002Fspan><\u002Fa>\n    <\u002Faside>\n\n    <!-- Content -->\n    <main class=\"content\">\n      <div class=\"head\">\n        <h1>Mi perfil<\u002Fh1>\n        <p>Información personal y preferencias de tu cuenta<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- ===== Avatar block ===== -->\n      <div class=\"avatar-block\">\n        <button class=\"avatar\" type=\"button\" aria-label=\"Cambiar foto\">\n          MR\n          <span class=\"cam\"><i data-lucide=\"camera\"><\u002Fi><\u002Fspan>\n        <\u002Fbutton>\n        <a class=\"avatar-link\" href=\"#\">Cambiar foto<\u002Fa>\n        <div class=\"avatar-name\">Martín Rodríguez<\u002Fdiv>\n        <div class=\"avatar-role\">\n          <span class=\"role-tag\">Admin<\u002Fspan>\n          <span class=\"dot\">·<\u002Fspan>\n          <span>Automotores del Norte<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ===== Personal info ===== -->\n      <section class=\"section\">\n        <div class=\"label\">Información personal<\u002Fdiv>\n\n        <div class=\"form\">\n          <div class=\"form-row\">\n            <div class=\"field\">\n              <label for=\"first\">Nombre<\u002Flabel>\n              <input class=\"input\" id=\"first\" type=\"text\" value=\"Martín\" autocomplete=\"given-name\">\n            <\u002Fdiv>\n            <div class=\"field\">\n              <label for=\"last\">Apellido<\u002Flabel>\n              <input class=\"input\" id=\"last\" type=\"text\" value=\"Rodríguez\" autocomplete=\"family-name\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"field\">\n            <label for=\"email\">Email<\u002Flabel>\n            <div class=\"input-wrap has-lock\">\n              <input class=\"input readonly\" id=\"email\" type=\"email\" value=\"martin@automotoresdelnorte.com\" readonly=\"\">\n              <i data-lucide=\"lock\" class=\"lock\"><\u002Fi>\n            <\u002Fdiv>\n            <span class=\"hint\">Para cambiar el email contactá <a href=\"#\" style=\"color: var(--cyan); text-decoration: none;\">soporte<\u002Fa>.<\u002Fspan>\n          <\u002Fdiv>\n\n          <div class=\"field\">\n            <label for=\"phone\">Teléfono<\u002Flabel>\n            <input class=\"input\" id=\"phone\" type=\"tel\" value=\"+54 11 4567-8901\" placeholder=\"+54 11 ...\" autocomplete=\"tel\">\n          <\u002Fdiv>\n\n          <div class=\"field\">\n            <label for=\"role\">Cargo / Rol en la empresa<\u002Flabel>\n            <input class=\"input\" id=\"role\" type=\"text\" value=\"Gerente Comercial\">\n          <\u002Fdiv>\n\n          <div class=\"field\">\n            <label for=\"tz\">Zona horaria<\u002Flabel>\n            <select class=\"select\" id=\"tz\">\n              <option>America/Buenos_Aires (GMT−3)<\u002Foption>\n              <option>America/Santiago (GMT−4)<\u002Foption>\n              <option>America/Montevideo (GMT−3)<\u002Foption>\n              <option>America/Mexico_City (GMT−6)<\u002Foption>\n              <option>America/Bogota (GMT−5)<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n\n          <div class=\"save-row\">\n            <button class=\"btn btn-ghost\" type=\"button\">Cancelar<\u002Fbutton>\n            <button class=\"btn btn-primary\" type=\"button\"><i data-lucide=\"check\"><\u002Fi>Guardar cambios<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ===== Preferences ===== -->\n      <section class=\"section\">\n        <div class=\"label\">Preferencias<\u002Fdiv>\n\n        <div class=\"toggle-list\">\n          <div class=\"toggle-row\">\n            <div class=\"toggle-text\">\n              <span class=\"lbl\">Idioma de la interfaz<\u002Fspan>\n              <span class=\"desc\">Aplica a menús, etiquetas y notificaciones del producto.<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"segmented\" role=\"tablist\" aria-label=\"Idioma\">\n              <button type=\"button\" class=\"on\"><i data-lucide=\"check\"><\u002Fi>Español<\u002Fbutton>\n              <button type=\"button\">English<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"toggle-row\">\n            <div class=\"toggle-text\">\n              <span class=\"lbl\">Notificaciones por email<\u002Fspan>\n              <span class=\"desc\">Recibir resumen diario y alertas importantes.<\u002Fspan>\n            <\u002Fdiv>\n            <button class=\"switch on\" type=\"button\" role=\"switch\" aria-checked=\"true\" aria-label=\"Notificaciones por email\"><\u002Fbutton>\n          <\u002Fdiv>\n\n          <div class=\"toggle-row\">\n            <div class=\"toggle-text\">\n              <span class=\"lbl\">Sonidos de notificación<\u002Fspan>\n              <span class=\"desc\">Reproducir un sonido cuando llega un lead o mensaje nuevo.<\u002Fspan>\n            <\u002Fdiv>\n            <button class=\"switch\" type=\"button\" role=\"switch\" aria-checked=\"false\" aria-label=\"Sonidos de notificación\"><\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ===== Danger zone ===== -->\n      <section class=\"section danger\">\n        <div class=\"label\">Zona de peligro<\u002Fdiv>\n\n        <div class=\"danger-box\">\n          <div class=\"txt\">\n            <span class=\"ttl\">Eliminar mi cuenta<\u002Fspan>\n            <span class=\"sub\">Esta acción es irreversible. Todos tus datos serán eliminados.<\u002Fspan>\n          <\u002Fdiv>\n          <button class=\"btn-danger\" type=\"button\">\n            <i data-lucide=\"trash-2\"><\u002Fi>\n            Eliminar cuenta\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fmain>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  lucide.createIcons();\n\n  // Toggle switches\n  document.querySelectorAll('.switch').forEach(sw => {\n    sw.addEventListener('click', () => {\n      const on = sw.classList.toggle('on');\n      sw.setAttribute('aria-checked', String(on));\n    });\n  });\n\n  // Segmented control — pre-stamp every button with a check; CSS hides it on inactive\n  document.querySelectorAll('.segmented button').forEach(btn => {\n    if (!btn.querySelector('[data-lucide=\"check\"]') && !btn.querySelector('svg.lucide-check')) {\n      const i = document.createElement('i');\n      i.setAttribute('data-lucide', 'check');\n      btn.prepend(i);\n    }\n  });\n  lucide.createIcons();\n\n  document.querySelectorAll('.segmented').forEach(group => {\n    group.querySelectorAll('button').forEach(btn => {\n      btn.addEventListener('click', () => {\n        group.querySelectorAll('button').forEach(b => b.classList.remove('on'));\n        btn.classList.add('on');\n      });\n    });\n  });\n\n  // Sub-nav active state (visual only)\n  document.querySelectorAll('.sub-item').forEach(item => {\n    item.addEventListener('click', (e) => {\n      if (item.getAttribute('href') === '#') {\n        e.preventDefault();\n      }\n    });\n  });\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
