<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-base); font-family: var(--font-sans); color: var(--text-primary); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 70px; height: 70px; background: var(--bg-elevated); border: 1px solid var(--border-default); }
  .name { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-secondary); }
  .px { font-size: 11px; font-weight: 600; color: var(--text-primary); }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius: 4px;"></div><div class="px">4px</div><div class="name">--radius-xs</div></div>
    <div class="item"><div class="box" style="border-radius: 8px;"></div><div class="px">8px</div><div class="name">--radius-md</div></div>
    <div class="item"><div class="box" style="border-radius: 12px;"></div><div class="px">12px</div><div class="name">--radius-lg</div></div>
    <div class="item"><div class="box" style="border-radius: 16px;"></div><div class="px">16px</div><div class="name">--radius-xl</div></div>
    <div class="item"><div class="box" style="border-radius: 24px;"></div><div class="px">24px</div><div class="name">--radius-2xl</div></div>
    <div class="item"><div class="box" style="border-radius: 100px;"></div><div class="px">pill</div><div class="name">--radius-pill</div></div>
  </div>
</body>
</html>
