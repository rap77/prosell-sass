<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Badges & Tags</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bg-base); font-family: var(--font-sans); color: var(--text-primary); }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .label { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-secondary); min-width: 90px; }
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 100px; font-size: 11.5px; font-weight: 500; }
  .badge-sq { border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 600; letter-spacing: 0.02em; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
</style>
</head>
<body>
  <div class="row">
    <div class="label">Pill</div>
    <span class="badge" style="background: rgba(34,211,160,0.12); color: #22D3A0;"><span class="dot" style="background:#22D3A0"></span>Closed Won</span>
    <span class="badge" style="background: rgba(245,166,35,0.12); color: #F5A623;"><span class="dot" style="background:#F5A623"></span>At risk</span>
    <span class="badge" style="background: rgba(240,68,56,0.12); color: #F04438;"><span class="dot" style="background:#F04438"></span>Lost</span>
    <span class="badge" style="background: rgba(77,184,255,0.12); color: #4DB8FF;"><span class="dot" style="background:#4DB8FF"></span>Negotiating</span>
  </div>
  <div class="row">
    <div class="label">Square</div>
    <span class="badge-sq" style="background: rgba(77,184,255,0.12); color: #4DB8FF;">ENTERPRISE</span>
    <span class="badge-sq" style="background: rgba(34,211,160,0.12); color: #22D3A0;">+34% QoQ</span>
    <span class="badge-sq" style="background: rgba(13,27,110,0.6); color: #8A9BBF; border: 1px solid rgba(77,184,255,0.15);">SaaS</span>
    <span class="badge-sq" style="background: rgba(13,27,110,0.6); color: #8A9BBF; border: 1px solid rgba(77,184,255,0.15);">Series C</span>
  </div>
</body>
</html>
