<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Form inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-base); font-family: var(--font-sans); color: var(--text-primary); }
  .row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .label { font-size: 11.5px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.02em; }
  .input { background: rgba(13,27,62,0.6); border: 1px solid rgba(77,184,255,0.15); border-radius: 8px; padding: 10px 14px; color: var(--text-primary); font-family: inherit; font-size: 14px; outline: none; transition: all 180ms; }
  .input::placeholder { color: var(--text-disabled); }
  .input.focused { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(77,184,255,0.15); }
  .input.error { border-color: var(--error); }
  .err { font-size: 11px; color: var(--error); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="row">
      <div class="label">DEFAULT</div>
      <input class="input" placeholder="Search accounts, deals…" />
    </div>
    <div class="row">
      <div class="label">FOCUSED</div>
      <input class="input focused" value="Acme Corp" />
    </div>
    <div class="row">
      <div class="label">FILLED</div>
      <input class="input" value="sarah@prosell.io" />
    </div>
    <div class="row">
      <div class="label">ERROR</div>
      <input class="input error" value="invalid@" />
      <div class="err">Enter a valid email address.</div>
    </div>
  </div>
</body>
</html>
