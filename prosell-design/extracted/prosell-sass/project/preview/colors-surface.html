<!-- Card 1: Base / Surface colors -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Surface palette</title>
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: var(--bg-base);
        font-family: var(--font-sans);
        color: var(--text-primary);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      .swatch {
        border-radius: var(--radius-lg);
        border: 1px solid var(--border-default);
        overflow: hidden;
      }
      .swatch-fill {
        height: 88px;
      }
      .swatch-meta {
        padding: 12px 14px;
        background: rgba(13, 27, 62, 0.5);
      }
      .swatch-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-primary);
      }
      .swatch-hex {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-secondary);
        margin-top: 2px;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="swatch">
        <div class="swatch-fill" style="background: #060d24"></div>
        <div class="swatch-meta">
          <div class="swatch-name">bg-base</div>
          <div class="swatch-hex">#060D24</div>
        </div>
      </div>
      <div class="swatch">
        <div class="swatch-fill" style="background: #0d1b3e"></div>
        <div class="swatch-meta">
          <div class="swatch-name">bg-surface</div>
          <div class="swatch-hex">#0D1B3E</div>
        </div>
      </div>
      <div class="swatch">
        <div class="swatch-fill" style="background: #1a2d5a"></div>
        <div class="swatch-meta">
          <div class="swatch-name">bg-elevated</div>
          <div class="swatch-hex">#1A2D5A</div>
        </div>
      </div>
    </div>
  </body>
</html>
