<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Text palette</title>
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: var(--bg-base);
        font-family: var(--font-sans);
        color: var(--text-primary);
      }
      .row {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px;
        background: rgba(13, 27, 62, 0.7);
        border: 1px solid var(--border-default);
        border-radius: var(--radius-md);
        backdrop-filter: blur(20px);
      }
      .label {
        font-size: 17px;
        font-weight: 500;
      }
      .meta {
        display: flex;
        gap: 14px;
        align-items: center;
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text-secondary);
      }
      .chip {
        width: 16px;
        height: 16px;
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="item">
        <div class="label" style="color: #f0f4ff">
          Pipeline at risk this quarter — 4 deals
        </div>
        <div class="meta">
          <div class="chip" style="background: #f0f4ff"></div>
          text-primary · #F0F4FF
        </div>
      </div>
      <div class="item">
        <div class="label" style="color: #8a9bbf">
          Acme Corp · last touched 2 days ago
        </div>
        <div class="meta">
          <div class="chip" style="background: #8a9bbf"></div>
          text-secondary · #8A9BBF
        </div>
      </div>
      <div class="item">
        <div class="label" style="color: #3d4f72">
          Search accounts, deals, contacts…
        </div>
        <div class="meta">
          <div class="chip" style="background: #3d4f72"></div>
          text-disabled · #3D4F72
        </div>
      </div>
    </div>
  </body>
</html>
