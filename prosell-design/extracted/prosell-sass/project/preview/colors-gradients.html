<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Gradients</title>
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: var(--bg-base);
        font-family: var(--font-sans);
        color: var(--text-primary);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }
      .card {
        border-radius: var(--radius-lg);
        overflow: hidden;
        border: 1px solid var(--border-default);
      }
      .fill {
        height: 130px;
        position: relative;
        overflow: hidden;
      }
      .meta {
        padding: 10px 14px;
        background: rgba(13, 27, 62, 0.6);
      }
      .name {
        font-size: 12px;
        font-weight: 600;
      }
      .desc {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-secondary);
        margin-top: 2px;
        line-height: 1.4;
      }
      .glow-host {
        background: var(--bg-base);
      }
      .cta-text {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #4db8ff, #1e5fd4);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="card">
        <div
          class="fill"
          style="
            background: linear-gradient(
              135deg,
              #060d24 0%,
              #0d1b6e 50%,
              #1e5fd4 100%
            );
          "
        ></div>
        <div class="meta">
          <div class="name">hero</div>
          <div class="desc">135deg navy → blue</div>
        </div>
      </div>
      <div class="card">
        <div
          class="fill glow-host"
          style="background: var(--bg-base); position: relative"
        >
          <div
            style="
              position: absolute;
              inset: 0;
              background: radial-gradient(
                ellipse at 70% 20%,
                rgba(30, 95, 212, 0.5),
                transparent 60%
              );
            "
          ></div>
        </div>
        <div class="meta">
          <div class="name">glow</div>
          <div class="desc">radial accent</div>
        </div>
      </div>
      <div class="card">
        <div class="fill" style="background: var(--bg-surface)">
          <div class="cta-text">Aa</div>
        </div>
        <div class="meta">
          <div class="name">cta-text</div>
          <div class="desc">cyan → blue, on text</div>
        </div>
      </div>
    </div>
  </body>
</html>
