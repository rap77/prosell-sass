<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Status colors</title>
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: var(--bg-base);
        font-family: var(--font-sans);
        color: var(--text-primary);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }
      .card {
        padding: 16px;
        border-radius: var(--radius-lg);
        border: 1px solid var(--border-default);
        background: rgba(13, 27, 62, 0.7);
        backdrop-filter: blur(20px);
      }
      .swatch {
        height: 36px;
        border-radius: var(--radius-sm);
        margin-bottom: 12px;
      }
      .name {
        font-size: 13px;
        font-weight: 600;
      }
      .hex {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-secondary);
        margin-top: 2px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 10px;
        border-radius: 100px;
        font-size: 11px;
        font-weight: 500;
        margin-top: 10px;
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="card">
        <div class="swatch" style="background: #22d3a0"></div>
        <div class="name">success</div>
        <div class="hex">#22D3A0</div>
        <div
          class="badge"
          style="background: rgba(34, 211, 160, 0.12); color: #22d3a0"
        >
          <span class="dot" style="background: #22d3a0"></span>Closed Won
        </div>
      </div>
      <div class="card">
        <div class="swatch" style="background: #f5a623"></div>
        <div class="name">warning</div>
        <div class="hex">#F5A623</div>
        <div
          class="badge"
          style="background: rgba(245, 166, 35, 0.12); color: #f5a623"
        >
          <span class="dot" style="background: #f5a623"></span>At risk
        </div>
      </div>
      <div class="card">
        <div class="swatch" style="background: #f04438"></div>
        <div class="name">error</div>
        <div class="hex">#F04438</div>
        <div
          class="badge"
          style="background: rgba(240, 68, 56, 0.12); color: #f04438"
        >
          <span class="dot" style="background: #f04438"></span>Lost
        </div>
      </div>
    </div>
  </body>
</html>
