<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Buttons</title>
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      body {
        margin: 0;
        padding: 28px;
        background: var(--bg-base);
        font-family: var(--font-sans);
        color: var(--text-primary);
      }
      .row {
        display: flex;
        gap: 14px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .label {
        font-family: var(--font-mono);
        font-size: 10.5px;
        color: var(--text-secondary);
        width: 80px;
      }
      .btn {
        font-family: inherit;
        border: 0;
        cursor: pointer;
        padding: 10px 18px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        transition: all 200ms cubic-bezier(0.16, 1, 0.3, 1);
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .btn-primary {
        background: var(--cyan);
        color: var(--bg-base);
      }
      .btn-primary.hover {
        background: var(--cyan-hover);
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(77, 184, 255, 0.35);
      }
      .btn-ghost {
        background: transparent;
        border: 1px solid rgba(77, 184, 255, 0.2);
        color: var(--text-primary);
      }
      .btn-ghost.hover {
        border-color: var(--cyan);
      }
      .btn-disabled {
        background: rgba(77, 184, 255, 0.2);
        color: var(--text-disabled);
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="label">Primary</div>
      <button class="btn btn-primary">Connect Salesforce</button>
      <button class="btn btn-primary hover">Connect Salesforce</button>
      <button class="btn btn-disabled">Connect Salesforce</button>
    </div>
    <div class="row">
      <div class="label">Ghost</div>
      <button class="btn btn-ghost">View deal</button>
      <button class="btn btn-ghost hover">View deal</button>
    </div>
    <div class="row">
      <div class="label" style="opacity: 0"></div>
      <span
        style="
          font-family: var(--font-mono);
          font-size: 10px;
          color: var(--text-secondary);
        "
        >default · hover · disabled</span
      >
    </div>
  </body>
</html>
