<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Type scale — display</title>
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      body {
        margin: 0;
        padding: 28px;
        background: var(--bg-base);
      }
      .stack {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .row {
        display: flex;
        align-items: baseline;
        gap: 18px;
      }
      .meta {
        font-family: var(--font-mono);
        font-size: 10.5px;
        color: var(--text-secondary);
        min-width: 130px;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="stack">
      <div class="row">
        <div class="meta">Hero · 64 / 800</div>
        <div class="ds-hero" style="font-size: 44px">Pipeline intelligence</div>
      </div>
      <div class="row">
        <div class="meta">H1 · 48 / 700</div>
        <div class="ds-h1" style="font-size: 34px">Close more deals</div>
      </div>
      <div class="row">
        <div class="meta">H2 · 36 / 600</div>
        <div class="ds-h2" style="font-size: 26px">Account intelligence</div>
      </div>
      <div class="row">
        <div class="meta">H3 · 24 / 600</div>
        <div class="ds-h3">Recent signals</div>
      </div>
    </div>
  </body>
</html>
