<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Avatars</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bg-base); font-family: var(--font-sans); color: var(--text-primary); }
  .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .av { display: inline-flex; align-items: center; justify-content: center; font-weight: 600; color: var(--bg-base); }
  .av-sm { width: 24px; height: 24px; border-radius: 50%; font-size: 10px; }
  .av-md { width: 36px; height: 36px; border-radius: 50%; font-size: 13px; }
  .av-lg { width: 56px; height: 56px; border-radius: 50%; font-size: 20px; }
  .stack { display: flex; }
  .stack .av { border: 2px solid var(--bg-base); margin-left: -8px; }
  .stack .av:first-child { margin-left: 0; }
  .meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-secondary); margin-top: 14px; }
</style>
</head>
<body>
  <div class="row">
    <div class="av av-lg" style="background: linear-gradient(135deg, #4DB8FF, #1E5FD4);">SC</div>
    <div class="av av-md" style="background: linear-gradient(135deg, #4DB8FF, #1E5FD4);">JD</div>
    <div class="av av-md" style="background: linear-gradient(135deg, #22D3A0, #1E5FD4);">MK</div>
    <div class="av av-md" style="background: linear-gradient(135deg, #F5A623, #F04438);">RP</div>
    <div class="av av-sm" style="background: linear-gradient(135deg, #4DB8FF, #1E5FD4);">AL</div>
    <div class="stack">
      <div class="av av-md" style="background: linear-gradient(135deg, #4DB8FF, #1E5FD4);">JD</div>
      <div class="av av-md" style="background: linear-gradient(135deg, #22D3A0, #1E5FD4);">MK</div>
      <div class="av av-md" style="background: linear-gradient(135deg, #F5A623, #F04438);">RP</div>
      <div class="av av-md" style="background: var(--bg-elevated); color: var(--text-secondary); font-size: 11px;">+4</div>
    </div>
  </div>
  <div class="meta">Initials + gradient · never photo avatars</div>
</body>
</html>
