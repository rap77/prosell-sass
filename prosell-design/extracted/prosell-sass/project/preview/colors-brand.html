<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brand palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-base); font-family: var(--font-sans); color: var(--text-primary); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .swatch { border-radius: var(--radius-lg); border: 1px solid var(--border-default); overflow: hidden; }
  .swatch-fill { height: 88px; position: relative; }
  .swatch-meta { padding: 10px 12px; background: rgba(13, 27, 62, 0.5); }
  .swatch-name { font-size: 12px; font-weight: 600; }
  .swatch-hex { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-secondary); margin-top: 2px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch">
      <div class="swatch-fill" style="background: #0D1B6E"></div>
      <div class="swatch-meta"><div class="swatch-name">navy</div><div class="swatch-hex">#0D1B6E</div></div>
    </div>
    <div class="swatch">
      <div class="swatch-fill" style="background: #1E5FD4"></div>
      <div class="swatch-meta"><div class="swatch-name">blue</div><div class="swatch-hex">#1E5FD4</div></div>
    </div>
    <div class="swatch">
      <div class="swatch-fill" style="background: #4DB8FF"></div>
      <div class="swatch-meta"><div class="swatch-name">cyan · primary</div><div class="swatch-hex">#4DB8FF</div></div>
    </div>
    <div class="swatch">
      <div class="swatch-fill" style="background: #7DCEFF"></div>
      <div class="swatch-meta"><div class="swatch-name">cyan-hover</div><div class="swatch-hex">#7DCEFF</div></div>
    </div>
  </div>
</body>
</html>
