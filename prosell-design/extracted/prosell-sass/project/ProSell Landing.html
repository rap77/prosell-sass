    <script>
      document.addEventListener("DOMContentLoaded", async function () {
        const loading = document.getElementById("__bundler_loading");
        function setStatus(msg) {
          if (loading) loading.textContent = msg;
        }

        // Error sink persists across replaceWith since it's on window, not the DOM.
        window.addEventListener(
          "error",
          function (e) {
            var p = document.body || document.documentElement;
            var d =
              document.getElementById("__bundler_err") ||
              p.appendChild(document.createElement("div"));
            d.id = "__bundler_err";
            d.style.cssText =
              "position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto";
            d.textContent =
              (d.textContent ? d.textContent + String.fromCharCode(10) : "") +
              "[bundle] " +
              (e.message || e.type) +
              (e.filename
                ? " (" + e.filename.slice(0, 60) + ":" + e.lineno + ")"
                : "");
          },
          true,
        );

        try {
          const manifestEl = document.querySelector(
            'script[type="__bundler/manifest"]',
          );
          const templateEl = document.querySelector(
            'script[type="__bundler/template"]',
          );
          if (!manifestEl || !templateEl) {
            setStatus("Error: missing bundle data");
            console.error(
              "[bundler] Missing script tags — manifestEl:",
              !!manifestEl,
              "templateEl:",
              !!templateEl,
            );
            return;
          }

          const manifest = JSON.parse(manifestEl.textContent);
          let template = JSON.parse(templateEl.textContent);

          const uuids = Object.keys(manifest);
          setStatus("Unpacking " + uuids.length + " assets...");

          const blobUrls = {};
          await Promise.all(
            uuids.map(async (uuid) => {
              const entry = manifest[uuid];
              try {
                const binaryStr = atob(entry.data);
                const bytes = new Uint8Array(binaryStr.length);
                for (let i = 0; i < binaryStr.length; i++)
                  bytes[i] = binaryStr.charCodeAt(i);

                let finalBytes = bytes;
                if (entry.compressed) {
                  if (typeof DecompressionStream !== "undefined") {
                    const ds = new DecompressionStream("gzip");
                    const writer = ds.writable.getWriter();
                    const reader = ds.readable.getReader();
                    writer.write(bytes);
                    writer.close();
                    const chunks = [];
                    let totalLen = 0;
                    while (true) {
                      const { done, value } = await reader.read();
                      if (done) break;
                      chunks.push(value);
                      totalLen += value.length;
                    }
                    finalBytes = new Uint8Array(totalLen);
                    let offset = 0;
                    for (const chunk of chunks) {
                      finalBytes.set(chunk, offset);
                      offset += chunk.length;
                    }
                  } else {
                    console.warn(
                      "DecompressionStream not available, asset " +
                        uuid +
                        " may not render",
                    );
                  }
                }

                blobUrls[uuid] = URL.createObjectURL(
                  new Blob([finalBytes], { type: entry.mime }),
                );
              } catch (err) {
                console.error("Failed to decode asset " + uuid + ":", err);
                blobUrls[uuid] = URL.createObjectURL(
                  new Blob([], { type: entry.mime }),
                );
              }
            }),
          );

          const extResEl = document.querySelector(
            'script[type="__bundler/ext_resources"]',
          );
          const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
          const resourceMap = {};
          for (const entry of extResources) {
            if (blobUrls[entry.uuid])
              resourceMap[entry.id] = blobUrls[entry.uuid];
          }

          setStatus("Rendering...");
          for (const uuid of uuids)
            template = template.split(uuid).join(blobUrls[uuid]);

          // Strip integrity + crossorigin — blob URLs from a file:// document inherit
          // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
          // The manifest bytes are ours; SRI protects against CDN compromise, not this.
          template = template
            .replace(/\s+integrity="[^"]*"/gi, "")
            .replace(/\s+crossorigin="[^"]*"/gi, "");

          const resourceScript =
            "<script>window.__resources = " +
            JSON.stringify(resourceMap)
              .split("</" + "script>")
              .join("<\\/" + "script>") +
            ";</" +
            "script>";
          // Inject after <head> so the DOCTYPE stays first; prepending the script
          // would push the parser into quirks mode. DOMParser always emits a <head>
          // (synthesizing one if the source HTML omitted it) but may carry
          // attributes through, so match the full opening tag. slice() rather than
          // replace() keeps us clear of $-pattern substitution in resourceScript.
          const headOpen = template.match(/<head[^>]*>/i);
          if (headOpen) {
            const i = headOpen.index + headOpen[0].length;
            template =
              template.slice(0, i) + resourceScript + template.slice(i);
          }

          // Parse the template and swap the root element. Scripts inserted via
          // DOMParser/replaceWith are inert per spec — re-create each with
          // createElement so they execute, awaiting onload for src scripts to
          // preserve ordering (React before ReactDOM before Babel before text/babel).
          const doc = new DOMParser().parseFromString(template, "text/html");
          document.documentElement.replaceWith(doc.documentElement);
          const dead = Array.from(document.scripts);
          for (const old of dead) {
            const s = document.createElement("script");
            for (const a of old.attributes) s.setAttribute(a.name, a.value);
            s.textContent = old.textContent;
            // text/babel scripts with a src: fetch and inline. transformScriptTags
            // does XHR against the src, but blob:null/ from a file:// origin is
            // silently dropped. Inlining makes it a plain inline babel script,
            // which transformScriptTags handles unconditionally.
            if ((s.type === "text/babel" || s.type === "text/jsx") && s.src) {
              const r = await fetch(s.src);
              s.textContent = await r.text();
              s.removeAttribute("src");
            }
            const p = s.src
              ? new Promise(function (r) {
                  s.onload = s.onerror = r;
                })
              : null;
            old.replaceWith(s);
            if (p) await p;
          }
          // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
          // which fired before we swapped the document. Trigger manually if present.
          if (
            window.Babel &&
            typeof window.Babel.transformScriptTags === "function"
          ) {
            window.Babel.transformScriptTags();
          }
        } catch (err) {
          setStatus("Error unpacking: " + err.message);
          console.error("Bundle unpack error:", err);
        }
      });
    </script>

n  font-weight: 500;\n  font-display: swap;\n  src: url(\"5e1feb7b-97c1-4072-8208-cdeb579d0d88\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"9c9f0e23-eee6-40f4-8d07-d6f6900b93f7\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"6afe7f1f-3834-420d-a33e-fdeae716792e\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"d4c4056b-be7f-44a6-979a-0f4ffe7f81f5\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"a9374a77-2697-44bd-a2e2-d54e28e0d8e3\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ---------- Color: Base / Surfaces ---------- */\n  --bg-base:        #060D24;\n  --bg-surface:     #0D1B3E;\n  --bg-elevated:    #1A2D5A;\n\n  /* ---------- Color: Brand ---------- */\n  --navy:           #0D1B6E;\n  --blue:           #1E5FD4;\n  --cyan:           #4DB8FF;\n  --cyan-hover:     #7DCEFF;\n\n  /* ---------- Color: Text ---------- */\n  --text-primary:   #F0F4FF;\n  --text-secondary: #8A9BBF;\n  --text-disabled:  #3D4F72;\n\n  /* ---------- Color: Status ---------- */\n  --success:        #22D3A0;\n  --warning:        #F5A623;\n  --error:          #F04438;\n\n  /* Status background tints (12% opacity for badges) */\n  --success-bg:     rgba(34, 211, 160, 0.12);\n  --warning-bg:     rgba(245, 166, 35, 0.12);\n  --error-bg:       rgba(240, 68, 56, 0.12);\n  --info-bg:        rgba(77, 184, 255, 0.12);\n\n  /* ---------- Borders ---------- */\n  --border-subtle:  rgba(77, 184, 255, 0.10);\n  --border-default: rgba(77, 184, 255, 0.15);\n  --border-strong:  rgba(77, 184, 255, 0.30);\n  --border-active:  #4DB8FF;\n\n  /* ---------- Gradients ---------- */\n  --gradient-hero:    linear-gradient(135deg, #060D24 0%, #0D1B6E 50%, #1E5FD4 100%);\n  --gradient-glow:    radial-gradient(ellipse at 70% 20%, rgba(30, 95, 212, 0.18), transparent 60%);\n  --gradient-cta:     linear-gradient(135deg, #4DB8FF, #1E5FD4);\n  --gradient-text:    linear-gradient(135deg, #4DB8FF, #1E5FD4);\n\n  /* ---------- Shadows / Elevation ---------- */\n  --shadow-sm:    0 2px 8px rgba(6, 13, 36, 0.4);\n  --shadow-md:    0 8px 24px rgba(6, 13, 36, 0.5);\n  --shadow-lg:    0 16px 48px rgba(6, 13, 36, 0.55);\n  --shadow-xl:    0 32px 80px rgba(6, 13, 36, 0.6);\n  --shadow-glow-cyan: 0 8px 32px rgba(77, 184, 255, 0.35);\n  --shadow-glow-blue: 0 8px 32px rgba(30, 95, 212, 0.4);\n  --shadow-inset-top: inset 0 1px 0 rgba(255, 255, 255, 0.06);\n\n  /* ---------- Radii ---------- */\n  --radius-xs:    4px;\n  --radius-sm:    6px;\n  --radius-md:    8px;\n  --radius-lg:    12px;\n  --radius-xl:    16px;\n  --radius-2xl:   24px;\n  --radius-pill:  100px;\n\n  /* ---------- Spacing (4px base) ---------- */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n  --space-24: 96px;\n\n  /* ---------- Typography: families ---------- */\n  --font-sans: \"Inter\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;\n  --font-mono: \"JetBrains Mono\", \"SF Mono\", Menlo, Consolas, monospace;\n\n  /* ---------- Typography: scale ---------- */\n  --fs-hero:   64px;\n  --fs-h1:     48px;\n  --fs-h2:     36px;\n  --fs-h3:     24px;\n  --fs-h4:     18px;\n  --fs-body-lg: 18px;\n  --fs-body:   16px;\n  --fs-small:  14px;\n  --fs-xs:     12px;\n\n  /* ---------- Typography: weights ---------- */\n  --fw-regular:  400;\n  --fw-medium:   500;\n  --fw-semibold: 600;\n  --fw-bold:     700;\n  --fw-black:    800;\n\n  /* ---------- Motion ---------- */\n  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);\n  --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);\n  --dur-fast:    120ms;\n  --dur-base:    200ms;\n  --dur-slow:    320ms;\n}\n\n/* ============================================================\n   Semantic typography classes\n   ============================================================ */\n\n.ds-hero {\n  font-family: var(--font-sans);\n  font-size: var(--fs-hero);\n  font-weight: var(--fw-black);\n  line-height: 1.05;\n  letter-spacing: -0.03em;\n  color: var(--text-primary);\n}\n\n.ds-h1 {\n  font-family: var(--font-sans);\n  font-size: var(--fs-h1);\n  font-weight: var(--fw-bold);\n  line-height: 1.1;\n  letter-spacing: -0.025em;\n  color: var(--text-primary);\n}\n\n.ds-h2 {\n  font-family: var(--font-sans);\n  font-size: var(--fs-h2);\n  font-weight: var(--fw-semibold);\n  line-height: 1.15;\n  letter-spacing: -0.02em;\n  color: var(--text-primary);\n}\n\n.ds-h3 {\n  font-family: var(--font-sans);\n  font-size: var(--fs-h3);\n  font-weight: var(--fw-semibold);\n  line-height: 1.25;\n  letter-spacing: -0.015em;\n  color: var(--text-primary);\n}\n\n.ds-h4 {\n  font-family: var(--font-sans);\n  font-size: var(--fs-h4);\n  font-weight: var(--fw-semibold);\n  line-height: 1.35;\n  letter-spacing: -0.01em;\n  color: var(--text-primary);\n}\n\n.ds-body-lg {\n  font-family: var(--font-sans);\n  font-size: var(--fs-body-lg);\n  font-weight: var(--fw-regular);\n  line-height: 1.6;\n  color: var(--text-primary);\n}\n\n.ds-body {\n  font-family: var(--font-sans);\n  font-size: var(--fs-body);\n  font-weight: var(--fw-regular);\n  line-height: 1.6;\n  color: var(--text-primary);\n}\n\n.ds-small {\n  font-family: var(--font-sans);\n  font-size: var(--fs-small);\n  font-weight: var(--fw-regular);\n  line-height: 1.5;\n  color: var(--text-secondary);\n}\n\n.ds-xs {\n  font-family: var(--font-sans);\n  font-size: var(--fs-xs);\n  font-weight: var(--fw-medium);\n  line-height: 1.4;\n  letter-spacing: 0.01em;\n  color: var(--text-secondary);\n}\n\n.ds-eyebrow {\n  font-family: var(--font-sans);\n  font-size: var(--fs-xs);\n  font-weight: var(--fw-semibold);\n  line-height: 1.4;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--cyan);\n}\n\n.ds-mono {\n  font-family: var(--font-mono);\n  font-size: var(--fs-small);\n  font-weight: var(--fw-regular);\n  color: var(--text-secondary);\n}\n\n/* Gradient text (for CTA-style flourishes) */\n.ds-text-gradient {\n  background: var(--gradient-text);\n  -webkit-background-clip: text;\n  background-clip: text;\n  -webkit-text-fill-color: transparent;\n  color: transparent;\n}\n\n/* ============================================================\n   Base reset for ProSell surfaces\n   ============================================================ */\n\n.ds-surface-base {\n  background: var(--bg-base);\n  color: var(--text-primary);\n  font-family: var(--font-sans);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n<\u002Fstyle>\n<script src=\"c0ecfc8c-b0e7-4fbc-ba01-db457f41373d\"><\u002Fscript>\n<style>\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  background: var(--bg-base);\n  color: var(--text-primary);\n  font-family: var(--font-sans);\n  -webkit-font-smoothing: antialiased;\n  min-height: 100vh;\n  overflow-x: hidden;\n}\n\n/* ----- Background decoration ----- */\n.bg-grid {\n  position: fixed; inset: 0; z-index: 0; pointer-events: none;\n  background-image:\n    linear-gradient(rgba(77,184,255,0.04) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(77,184,255,0.04) 1px, transparent 1px);\n  background-size: 56px 56px;\n  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);\n  -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);\n}\n.bg-glow {\n  position: fixed; inset: 0; z-index: 0; pointer-events: none;\n  background: radial-gradient(ellipse 60% 50% at 80% 20%, rgba(30,95,212,0.35), transparent 60%);\n}\n.bg-glow-2 {\n  position: fixed; inset: 0; z-index: 0; pointer-events: none;\n  background: radial-gradient(ellipse 50% 40% at 10% 80%, rgba(13,27,110,0.4), transparent 60%);\n}\n\n/* ----- Layout ----- */\n.page { position: relative; z-index: 1; }\n.container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }\n\n/* ----- Nav ----- */\n.nav {\n  position: sticky; top: 0; z-index: 50;\n  height: 72px;\n  display: flex; align-items: center;\n  background: rgba(6,13,36,0.7);\n  backdrop-filter: blur(20px);\n  border-bottom: 1px solid var(--border-subtle);\n}\n.nav-inner { display: flex; align-items: center; gap: 40px; width: 100%; max-width: 1280px; margin: 0 auto; padding: 0 32px; }\n.brand { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; letter-spacing: -0.02em; color: var(--text-primary); text-decoration: none; }\n.brand img { height: 30px; width: auto; }\n.nav-links { display: flex; gap: 32px; flex: 1; justify-content: center; }\n.nav-link { font-size: 14px; color: var(--text-secondary); text-decoration: none; font-weight: 500; transition: color 200ms var(--ease-out); }\n.nav-link:hover { color: var(--text-primary); }\n.nav-actions { display: flex; gap: 10px; align-items: center; }\n\n/* ----- Buttons ----- */\n.btn {\n  display: inline-flex; align-items: center; gap: 8px;\n  border: 0; padding: 11px 20px; border-radius: var(--radius-md);\n  font-family: inherit; font-size: 14px; font-weight: 600;\n  cursor: pointer; transition: all 220ms var(--ease-out); line-height: 1;\n  text-decoration: none;\n}\n.btn-primary { background: var(--cyan); color: var(--bg-base); }\n.btn-primary:hover { background: var(--cyan-hover); transform: translateY(-2px); box-shadow: var(--shadow-glow-cyan); }\n.btn-ghost { background: transparent; border: 1px solid rgba(77,184,255,0.2); color: var(--text-primary); }\n.btn-ghost:hover { border-color: var(--cyan); color: var(--text-primary); }\n.btn-sm { padding: 8px 14px; font-size: 13px; }\n.btn-lg { padding: 14px 24px; font-size: 15px; }\n.btn [data-lucide] { width: 16px; height: 16px; stroke-width: 2; }\n\n/* ----- Hero ----- */\n.hero {\n  display: grid;\n  grid-template-columns: 1.05fr 1fr;\n  gap: 80px;\n  align-items: center;\n  min-height: calc(100vh - 72px);\n  padding: 60px 0 100px;\n}\n\n/* ----- Pill ----- */\n.pill {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 6px 14px 6px 12px;\n  background: rgba(77,184,255,0.08);\n  border: 1px solid rgba(77,184,255,0.18);\n  border-radius: 100px;\n  font-size: 12.5px; font-weight: 500;\n  color: var(--text-primary);\n}\n.pulse-dot {\n  width: 8px; height: 8px; border-radius: 50%;\n  background: var(--cyan);\n  position: relative;\n}\n.pulse-dot::before {\n  content: \"\"; position: absolute; inset: -4px; border-radius: 50%;\n  background: var(--cyan); opacity: 0.5;\n  animation: pulse 1.8s var(--ease-out) infinite;\n}\n@keyframes pulse {\n  0% { transform: scale(0.6); opacity: 0.6; }\n  100% { transform: scale(2.2); opacity: 0; }\n}\n\n/* ----- Hero copy ----- */\n.h1 {\n  font-size: 64px; font-weight: 800; line-height: 1.04;\n  letter-spacing: -0.03em;\n  margin: 24px 0 24px;\n}\n.h1 .grad {\n  background: linear-gradient(135deg, #4DB8FF 0%, #1E5FD4 100%);\n  -webkit-background-clip: text; background-clip: text;\n  -webkit-text-fill-color: transparent; color: transparent;\n}\n.subtitle {\n  font-size: 18px; line-height: 1.6;\n  color: var(--text-secondary);\n  max-width: 540px;\n  margin: 0 0 36px;\n}\n.cta-row { display: flex; gap: 12px; align-items: center; margin-bottom: 32px; }\n\n/* ----- Social proof ----- */\n.social-proof { display: flex; align-items: center; gap: 14px; }\n.av-stack { display: flex; }\n.av-stack .av {\n  width: 34px; height: 34px; border-radius: 50%;\n  display: inline-flex; align-items: center; justify-content: center;\n  font-weight: 600; font-size: 12px; color: var(--bg-base);\n  border: 2px solid var(--bg-base);\n  margin-left: -8px;\n}\n.av-stack .av:first-child { margin-left: 0; }\n.proof-text { font-size: 13px; color: var(--text-secondary); }\n.proof-text strong { color: var(--text-primary); font-weight: 600; }\n.stars { color: var(--warning); font-size: 13px; letter-spacing: 1px; }\n\n/* ----- Right column: dashboard mockup ----- */\n.mockup-col { position: relative; display: flex; align-items: center; justify-content: center; min-height: 600px; }\n.mockup-glow {\n  position: absolute; inset: -20%;\n  background: radial-gradient(ellipse at center, rgba(77,184,255,0.18) 0%, rgba(30,95,212,0.12) 30%, transparent 60%);\n  filter: blur(40px);\n  pointer-events: none;\n}\n.dashboard {\n  position: relative;\n  width: 100%; max-width: 540px;\n  background: rgba(13,27,62,0.7);\n  border: 1px solid rgba(77,184,255,0.18);\n  border-radius: var(--radius-xl);\n  backdrop-filter: blur(24px);\n  box-shadow: var(--shadow-xl), inset 0 1px 0 rgba(255,255,255,0.06);\n  padding: 22px;\n  animation: float 6s var(--ease-in-out) infinite;\n}\n@keyframes float {\n  0%, 100% { transform: translateY(0); }\n  50% { transform: translateY(-10px); }\n}\n\n.dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }\n.dash-title { font-size: 15px; font-weight: 600; }\n.live-badge {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 3px 10px; border-radius: 100px;\n  background: rgba(34,211,160,0.12); color: var(--success);\n  font-size: 11px; font-weight: 600;\n}\n.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); position: relative; }\n.live-dot::before { content: \"\"; position: absolute; inset: -2px; border-radius: 50%; background: var(--success); opacity: 0.4; animation: pulse 1.8s var(--ease-out) infinite; }\n\n/* metrics */\n.metric-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }\n.metric {\n  background: rgba(6,13,36,0.5);\n  border: 1px solid var(--border-subtle);\n  border-radius: var(--radius-md);\n  padding: 12px 14px;\n}\n.metric-label { font-size: 10.5px; color: var(--text-secondary); margin-bottom: 4px; letter-spacing: 0.04em; }\n.metric-val { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }\n.metric-delta { font-size: 11px; color: var(--success); font-weight: 600; margin-top: 3px; display: inline-flex; align-items: center; gap: 3px; }\n.metric-delta [data-lucide] { width: 10px; height: 10px; stroke-width: 2.5; }\n\n/* chart */\n.chart-block { margin-bottom: 18px; }\n.chart-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }\n.chart-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.02em; }\n.chart-week { font-size: 10.5px; color: var(--text-disabled); font-family: var(--font-mono); }\n.chart {\n  display: flex; align-items: flex-end; gap: 6px;\n  height: 64px;\n  padding: 0 2px;\n}\n.bar {\n  flex: 1; border-radius: 3px 3px 0 0;\n  background: rgba(77,184,255,0.18);\n  position: relative;\n  transition: background 200ms;\n}\n.bar.active {\n  background: linear-gradient(to top, var(--cyan), var(--cyan-hover));\n  box-shadow: 0 0 18px rgba(77,184,255,0.5);\n}\n.bar.active::after {\n  content: \"\"; position: absolute; top: -5px; left: 50%; transform: translateX(-50%);\n  width: 6px; height: 6px; border-radius: 50%; background: var(--cyan-hover);\n  box-shadow: 0 0 8px var(--cyan-hover);\n}\n\n/* deal rows */\n.deal-list { display: flex; flex-direction: column; gap: 1px; background: var(--border-subtle); border-radius: var(--radius-md); overflow: hidden; }\n.deal-row { display: flex; align-items: center; gap: 12px; padding: 11px 14px; background: rgba(6,13,36,0.5); }\n.deal-av { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--bg-base); flex-shrink: 0; }\n.deal-name { flex: 1; font-size: 13px; font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }\n.deal-amount { font-size: 13px; font-weight: 700; font-family: var(--font-mono); }\n.deal-stage { font-size: 10.5px; font-weight: 600; padding: 3px 9px; border-radius: 100px; letter-spacing: 0.02em; }\n.stage-cierre { background: rgba(34,211,160,0.14); color: var(--success); }\n.stage-demo { background: rgba(77,184,255,0.14); color: var(--cyan); }\n.stage-propuesta { background: rgba(245,166,35,0.14); color: var(--warning); }\n\n/* floating badges */\n.float-badge {\n  position: absolute;\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 9px 14px;\n  background: rgba(13,27,62,0.92);\n  border: 1px solid rgba(77,184,255,0.25);\n  border-radius: var(--radius-md);\n  backdrop-filter: blur(20px);\n  box-shadow: var(--shadow-lg);\n  font-size: 12.5px; font-weight: 500;\n  white-space: nowrap;\n  z-index: 2;\n}\n.float-badge .ico { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }\n.float-badge .ico [data-lucide] { width: 14px; height: 14px; stroke-width: 2; }\n.float-badge .meta { display: flex; flex-direction: column; gap: 1px; }\n.float-badge .meta b { font-weight: 600; color: var(--text-primary); font-size: 12.5px; }\n.float-badge .meta span { font-size: 10.5px; color: var(--text-secondary); }\n\n.float-top {\n  top: -28px; left: -56px;\n  animation: float-1 7s var(--ease-in-out) infinite;\n}\n.float-top .ico { background: rgba(34,211,160,0.15); color: var(--success); }\n.float-bot {\n  bottom: -28px; right: -56px;\n  animation: float-2 7s var(--ease-in-out) infinite;\n}\n.float-bot .ico { background: rgba(77,184,255,0.15); color: var(--cyan); }\n\n@keyframes float-1 {\n  0%, 100% { transform: translateY(0) translateX(0); }\n  50% { transform: translateY(-12px) translateX(-4px); }\n}\n@keyframes float-2 {\n  0%, 100% { transform: translateY(0) translateX(0); }\n  50% { transform: translateY(-14px) translateX(6px); }\n}\n\n/* ----- Social proof section (below hero) ----- */\n.sp-section {\n  border-top: 1px solid rgba(77,184,255,0.06);\n  padding: 48px 0 64px;\n  position: relative;\n  z-index: 1;\n}\n.sp-inner {\n  display: flex; flex-direction: column;\n  align-items: center;\n  gap: 32px;\n}\n.sp-label {\n  font-size: 13px;\n  font-weight: 600;\n  text-transform: uppercase;\n  letter-spacing: 0.1em;\n  color: var(--text-secondary);\n  text-align: center;\n}\n.sp-logos {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  width: 100%;\n  max-width: 1100px;\n  gap: 32px;\n  flex-wrap: wrap;\n}\n.sp-logo {\n  font-size: 15px;\n  font-weight: 700;\n  letter-spacing: -0.01em;\n  color: var(--text-disabled);\n  opacity: 0.5;\n  transition: opacity 200ms var(--ease-out);\n  font-family: var(--font-sans);\n  white-space: nowrap;\n}\n.sp-logo:hover { opacity: 0.85; }\n\n.sp-stats {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  gap: 0;\n}\n.sp-stat {\n  display: flex; flex-direction: column;\n  align-items: center;\n  gap: 4px;\n  padding: 0 48px;\n  position: relative;\n  text-align: center;\n}\n.sp-stat + .sp-stat::before {\n  content: \"\";\n  position: absolute;\n  left: 0; top: 50%;\n  transform: translateY(-50%);\n  width: 1px; height: 40px;\n  background: rgba(77,184,255,0.10);\n}\n.sp-stat-num {\n  font-size: 32px;\n  font-weight: 700;\n  color: var(--text-primary);\n  letter-spacing: -0.02em;\n  line-height: 1.1;\n  font-variant-numeric: tabular-nums;\n}\n.sp-stat-label {\n  font-size: 13px;\n  font-weight: 400;\n  color: var(--text-secondary);\n  line-height: 1.4;\n}\n\n@media (max-width: 900px) {\n  .sp-logos { justify-content: center; gap: 20px 28px; }\n  .sp-stats { flex-wrap: wrap; gap: 24px; }\n  .sp-stat { padding: 0 24px; }\n  .sp-stat + .sp-stat::before { display: none; }\n}\n\n/* ----- Bottom logo strip ----- */\n.proof-strip {\n  border-top: 1px solid var(--border-subtle);\n  padding: 36px 0 60px;\n  display: flex; flex-direction: column; gap: 22px; align-items: center;\n}\n.proof-strip-label {\n  font-size: 11px; font-weight: 600; letter-spacing: 0.16em;\n  text-transform: uppercase; color: var(--text-disabled);\n}\n.logos-row { display: flex; gap: 56px; align-items: center; flex-wrap: wrap; justify-content: center; }\n.logo-wm {\n  font-size: 16px; font-weight: 700;\n  letter-spacing: 0.18em;\n  color: var(--text-disabled);\n  transition: color 200ms var(--ease-out);\n  font-family: var(--font-sans);\n}\n.logo-wm:hover { color: var(--text-secondary); }\n\n/* responsive fallback (still readable below 1100) */\n@media (max-width: 1100px) {\n  .hero { grid-template-columns: 1fr; gap: 60px; }\n  .h1 { font-size: 48px; }\n  .nav-links { display: none; }\n  .float-top { left: -8px; }\n  .float-bot { right: -8px; }\n}\n\n/* ============================================================\n   Problem → Solution section\n   ============================================================ */\n.ps-section {\n  position: relative;\n  padding: 100px 0;\n  border-top: 1px solid var(--border-subtle);\n  overflow: hidden;\n}\n.ps-section::before {\n  content: \"\";\n  position: absolute; inset: 0; pointer-events: none; z-index: 0;\n  background:\n    radial-gradient(ellipse 50% 35% at 20% 0%, rgba(240,67,56,0.08), transparent 60%),\n    radial-gradient(ellipse 50% 40% at 85% 100%, rgba(77,184,255,0.10), transparent 60%);\n}\n.ps-inner { position: relative; z-index: 1; }\n\n.eyebrow {\n  display: inline-block;\n  font-size: 12px; font-weight: 600;\n  text-transform: uppercase;\n  letter-spacing: 0.18em;\n  color: var(--cyan);\n}\n.eyebrow.problem { color: #F04438; }\n\n.ps-part-a {\n  max-width: 760px;\n  margin: 0 auto;\n  text-align: center;\n}\n.ps-part-a .eyebrow { margin-bottom: 18px; }\n.ps-h2-problem {\n  font-size: 48px; font-weight: 800; line-height: 1.08;\n  letter-spacing: -0.025em;\n  margin: 0 0 22px;\n  color: var(--text-primary);\n}\n.ps-h2-problem .accent {\n  background: linear-gradient(135deg, #F04438 0%, #F5A623 100%);\n  -webkit-background-clip: text; background-clip: text;\n  -webkit-text-fill-color: transparent; color: transparent;\n}\n.ps-subtext {\n  font-size: 18px; line-height: 1.6;\n  color: var(--text-secondary);\n  max-width: 600px;\n  margin: 0 auto 40px;\n}\n\n/* Pain stat chips */\n.pain-row {\n  display: flex; gap: 14px;\n  justify-content: center; flex-wrap: wrap;\n}\n.pain-chip {\n  display: flex; align-items: center; gap: 12px;\n  background: rgba(240,67,56,0.08);\n  border: 1px solid rgba(240,67,56,0.2);\n  border-radius: 10px;\n  padding: 16px 20px;\n}\n.pain-chip .num {\n  font-size: 24px; font-weight: 700;\n  color: #F04438;\n  letter-spacing: -0.02em;\n  font-variant-numeric: tabular-nums;\n}\n.pain-chip .lbl {\n  font-size: 12px;\n  color: var(--text-secondary);\n  line-height: 1.35;\n  text-align: left;\n  max-width: 140px;\n}\n\n/* Divider between part A and B */\n.ps-divider {\n  display: flex; align-items: center; justify-content: center;\n  margin: 80px 0;\n  position: relative;\n}\n.ps-divider::before,\n.ps-divider::after {\n  content: \"\";\n  flex: 1;\n  height: 1px;\n  background: linear-gradient(90deg, transparent, var(--border-default), transparent);\n  max-width: 220px;\n}\n.ps-divider .arrow-down {\n  width: 40px; height: 40px;\n  border-radius: 50%;\n  display: flex; align-items: center; justify-content: center;\n  background: rgba(77,184,255,0.10);\n  border: 1px solid rgba(77,184,255,0.25);\n  color: var(--cyan);\n  margin: 0 16px;\n}\n.ps-divider .arrow-down [data-lucide] { width: 18px; height: 18px; stroke-width: 2; }\n\n/* Part B header */\n.ps-part-b-head {\n  text-align: center;\n  max-width: 760px;\n  margin: 0 auto 56px;\n}\n.ps-part-b-head .eyebrow { margin-bottom: 18px; }\n.ps-h2-solution {\n  font-size: 40px; font-weight: 700; line-height: 1.12;\n  letter-spacing: -0.022em;\n  margin: 0 0 18px;\n  color: var(--text-primary);\n}\n.ps-h2-solution .grad {\n  background: linear-gradient(135deg, #4DB8FF 0%, #1E5FD4 100%);\n  -webkit-background-clip: text; background-clip: text;\n  -webkit-text-fill-color: transparent; color: transparent;\n}\n.ps-subtext-b {\n  font-size: 16px; line-height: 1.6;\n  color: var(--text-secondary);\n  max-width: 560px;\n  margin: 0 auto;\n}\n\n/* Feature cards grid */\n.feature-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 20px;\n}\n.feat-card {\n  position: relative;\n  background: rgba(13,27,62,0.7);\n  border: 1px solid rgba(77,184,255,0.12);\n  border-radius: 16px;\n  backdrop-filter: blur(20px);\n  padding: 28px;\n  display: flex; flex-direction: column;\n  transition: border-color 220ms var(--ease-out), transform 220ms var(--ease-out);\n}\n.feat-card:hover {\n  border-color: rgba(77,184,255,0.3);\n  transform: translateY(-4px);\n}\n.feat-icon {\n  width: 44px; height: 44px;\n  border-radius: 12px;\n  background: rgba(77,184,255,0.10);\n  border: 1px solid rgba(77,184,255,0.2);\n  display: flex; align-items: center; justify-content: center;\n  color: var(--cyan);\n  margin-bottom: 22px;\n}\n.feat-icon [data-lucide] { width: 22px; height: 22px; stroke-width: 1.75; }\n.feat-kicker {\n  font-size: 11px; font-weight: 600;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--text-disabled);\n  margin-bottom: 10px;\n}\n.feat-title {\n  font-size: 19px; font-weight: 700;\n  letter-spacing: -0.015em;\n  line-height: 1.3;\n  margin: 0 0 12px;\n  color: var(--text-primary);\n}\n.feat-desc {\n  font-size: 14px; line-height: 1.6;\n  color: var(--text-secondary);\n  margin: 0 0 24px;\n  flex: 1;\n}\n.feat-badge {\n  align-self: flex-start;\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 6px 12px;\n  border-radius: 100px;\n  border: 1px solid rgba(77,184,255,0.3);\n  background: rgba(77,184,255,0.06);\n  color: var(--cyan);\n  font-size: 11.5px; font-weight: 600;\n  font-family: var(--font-mono);\n  letter-spacing: 0.01em;\n}\n.feat-badge .dot {\n  width: 5px; height: 5px; border-radius: 50%;\n  background: var(--cyan);\n  box-shadow: 0 0 6px var(--cyan);\n}\n\n/* Niche switcher */\n.niche-row {\n  display: flex; align-items: center; justify-content: center;\n  gap: 12px; flex-wrap: wrap;\n  margin-top: 48px;\n}\n.niche-label {\n  font-size: 13px;\n  color: var(--text-secondary);\n  margin-right: 4px;\n}\n.niche-pill {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 9px 16px;\n  border-radius: 100px;\n  font-size: 13px; font-weight: 500;\n  border: 1px solid var(--border-subtle);\n  color: var(--text-secondary);\n  background: transparent;\n  cursor: pointer;\n  font-family: inherit;\n  transition: all 200ms var(--ease-out);\n}\n.niche-pill:hover { color: var(--text-primary); border-color: var(--border-default); }\n.niche-pill.active {\n  border-color: var(--cyan);\n  color: var(--cyan);\n  background: rgba(77,184,255,0.06);\n}\n.niche-pill .ico { font-size: 14px; line-height: 1; }\n\n/* ============================================================\n   Features section (alternating rows)\n   ============================================================ */\n.ft-section {\n  position: relative;\n  padding: 120px 0;\n  border-top: 1px solid var(--border-subtle);\n  overflow: hidden;\n}\n.ft-section:
