# Install both hook types with a single `pre-commit install`:
#   pre-commit -> fast per-commit checks (gga, ruff, pyright, formatting)
#   pre-push   -> heavier full verification before code leaves the machine
default_install_hook_types: [pre-commit, pre-push]

repos:
  # ============================================
  # Gentleman Guardian Angel (AI Code Review)
  # Runs FIRST - blocks commit on critical issues
  # ============================================
  - repo: local
    hooks:
      - id: gga
        name: Gentleman Guardian Angel
        entry: bash scripts/gga-batch.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]

      # ============================================
      # Secret scan — gitleaks-style lightweight check.
      # Runs AFTER GGA (the AI can suggest adding secrets; this catches them
      # before they ever leave the machine). Local hook (no network).
      # For deeper scanning, install gitleaks separately.
      # ============================================
      - id: no-secrets
        name: no-secrets (gitleaks-style)
        entry: bash scripts/verify-no-secrets.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]

      # ============================================
      # Spec Status Lifecycle enforcement — every spec in
      # docs/superpowers/specs/ MUST have a valid **Status**: field.
      # Catches drift between design and implementation state.
      # See CLAUDE.md "Spec Status Lifecycle" for the convention.
      # ============================================
      - id: spec-status-required
        name: spec status required
        entry: python3 scripts/validate_spec_status.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: ^docs/superpowers/specs/.*\.md$

      # ============================================
      # Frontend - lint-staged (ESLint + Prettier)
      # Runs ESLint --fix and Prettier --write on staged files.
      # Configured in package.json under "lint-staged" key.
      # ============================================
      - id: lint-staged
        name: lint-staged (ESLint + Prettier)
        entry: pnpm lint-staged
        language: system
        pass_filenames: false
        stages: [pre-commit]
        files: \.(ts|tsx|js|jsx|json|css|md|yaml|yml)$

  # ============================================
  # Python - Ruff (lint + format)
  # ============================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      # Linter with auto-fix
      - id: ruff
        args: [--fix]
        types_or: [python, pyi, jupyter]
      # Formatter
      - id: ruff-format
        types_or: [python, pyi, jupyter]

  # ============================================
  # Python - Pyright (Type checking)
  # ============================================
  - repo: local
    hooks:
      - id: pyright
        name: pyright (Python type checking)
        entry: bash -c 'cd apps/api && uv run pyright'
        language: system
        pass_filenames: false
        types: [python]
        files: ^(apps/api/src|apps/api/tests)/

  # ============================================
  # Frontend - ESLint (TODO: currently disabled due to next lint issues)
  # To enable manually: cd apps/web && pnpm run lint
  # ============================================
  # - repo: local
  #   hooks:
  #     - id: next-lint
  #       name: Next.js Lint
  #       entry: bash -c 'cd apps/web && pnpm run lint'
  #       language: system
  #       pass_filenames: false
  #       files: \.(ts|tsx|js|jsx)$

  # ============================================
  # Pre-PUSH gate - full verification before code leaves the machine.
  # Substitute for GitHub branch protection (unavailable on private free plan).
  # Re-checks lint + types from scratch (independent of whether pre-commit ran)
  # and runs the backend test suite (too slow to run on every commit).
  # Only fires when the push contains Python changes.
  # ============================================
  - repo: local
    hooks:
      - id: prettier-push
        name: prettier format check (pre-push)
        entry: pnpm format:check
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: ruff-push
        name: ruff check (pre-push)
        entry: bash -c 'cd apps/api && uv run ruff check src tests'
        language: system
        pass_filenames: false
        stages: [pre-push]
        types: [python]
      - id: pyright-push
        name: pyright type check (pre-push)
        entry: bash -c 'cd apps/api && uv run pyright'
        language: system
        pass_filenames: false
        stages: [pre-push]
        types: [python]
      # ponytail: sync test DB migrations before running tests
      - id: sync-test-db
        name: sync test DB migrations (pre-push)
        entry: bash scripts/sync-test-db.sh
        language: system
        pass_filenames: false
        stages: [pre-push]
        types: [python]
      - id: pytest-push
        name: pytest backend suite (pre-push)
        entry: bash -c 'cd apps/api && uv run pytest -q'
        language: system
        pass_filenames: false
        stages: [pre-push]
        types: [python]

  # ============================================
  # General - Pre-commit hooks
  # ============================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: check-toml
