# =============================================================================
# ProSell SaaS - Staging Docker Compose Configuration
# =============================================================================
# This is a production-like staging environment
# Services: API, Web, DB, Redis (no ngrok - use real domains)
# =============================================================================

services:
  # =============================================================================
  # POSTGRESQL 17 - Staging Database
  # =============================================================================
  db:
    image: postgres:17-alpine
    container_name: prosell-staging-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yQZMINddwF+ZzTRhTQJ/B1R9fXstcfUU5VcFDbNCdm0=
      POSTGRES_DB: prosell_staging
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =============================================================================
  # REDIS 7.4 - Staging Cache/Session Store
  # =============================================================================
  redis:
    image: redis:7.4-alpine
    container_name: prosell-staging-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_staging_data:/data
    command: redis-server --appendonly yes --requirepass StukwtH7fXAEp69HHIGozRLHfQRW6TFX
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =============================================================================
  # FASTAPI BACKEND - Staging API
  # =============================================================================
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: prosell-staging-api
    ports:
      - "8000:8000"
    env_file:
      - ../.env.staging
    environment:
      # Override critical staging values
      - ENVIRONMENT=staging
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://postgres:yQZMINddwF+ZzTRhTQJ/B1R9fXstcfUU5VcFDbNCdm0=@db:5432/prosell_staging
      - REDIS_URL=redis://:StukwtH7fXAEp69HHIGozRLHfQRW6TFX@redis:6379/0
      - REDIS_PASSWORD=StukwtH7fXAEp69HHIGozRLHfQRW6TFX
      # Object storage — staging MinIO (S3-compatible). Internal endpoint the
      # API uploads to; public endpoint is what the browser uses for presigned
      # URLs (host port 9002 → staging-minio:9000, distinct from dev's 9000).
      - S3_ENDPOINT_URL=http://prosell-staging-minio:9000
      - S3_PUBLIC_ENDPOINT_URL=http://localhost:9002
      - S3_FORCE_PATH_STYLE=true
      - DO_BUCKET_NAME=prosell-assets
      - DO_ACCESS_KEY_ID=minioadmin
      - DO_SECRET_ACCESS_KEY=minioadmin
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      # Mount JWT keys (generated separately)
      - ../apps/api/keys:/app/keys:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =============================================================================
  # NEXT.JS FRONTEND - Staging Web App
  # =============================================================================
  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: prosell-staging-web
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =============================================================================
  # MINIO - Staging object storage (S3-compatible)
  # =============================================================================
  minio:
    image: minio/minio:latest
    container_name: prosell-staging-minio
    ports:
      - "9002:9000" # S3 API — host 9002 to avoid clashing with dev's 9000
      - "9003:9001" # Web console
    volumes:
      - minio_staging_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      # `mc ready local` is unreliable here — the `local` alias is only
      # configured inside the minio-init container, not in this one. Hit the
      # HTTP health endpoint that minio itself exposes instead. The minio
      # image ships `curl` but not `wget`, so use the same `curl -f` pattern
      # the API healthcheck already uses.
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # MINIO INIT - create bucket + public-read policy on startup
  # =============================================================================
  minio-init:
    image: minio/mc:latest
    container_name: prosell-staging-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://prosell-staging-minio:9000 minioadmin minioadmin &&
      mc mb local/prosell-assets --ignore-existing &&
      mc anonymous set download local/prosell-assets &&
      echo 'MinIO bucket prosell-assets ready with anonymous read access'
      "
    restart: "no"

volumes:
  postgres_staging_data:
    driver: local
  redis_staging_data:
    driver: local
  minio_staging_data:
    driver: local

# =============================================================================
# NETWORKS
# =============================================================================
# All services communicate on the default bridge network
# For production, consider using an overlay network with Swarm
