# =============================================================================
# docker-compose.prod.yml — ProSell SaaS producción
# Dominio: prosellweb.com | API: api.prosellweb.com
# SSL: automático vía Caddy + Let's Encrypt
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # POSTGRESQL 17
  # ---------------------------------------------------------------------------
  db:
    image: postgres:17-alpine
    container_name: prosell-prod-db
    env_file:
      - ../.env.prod
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Sin expose de puerto al host — solo acceso interno

  # ---------------------------------------------------------------------------
  # REDIS 7.4
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: prosell-prod-redis
    env_file:
      - ../.env.prod
    command:
      [
        "sh",
        "-c",
        "redis-server --appendonly yes --requirepass $$REDIS_PASSWORD",
      ]
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # FASTAPI BACKEND
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: prosell-prod-api
    env_file:
      - ../.env.prod
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - ALLOWED_ORIGINS=https://prosellweb.com,https://www.prosellweb.com
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../apps/api/keys:/app/keys:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # NEXT.JS FRONTEND
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ..
      dockerfile: docker/web.prod.Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api.prosellweb.com
    container_name: prosell-prod-web
    environment:
      - API_URL=http://api:8000
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # CADDY — reverse proxy + SSL automático
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: prosell-prod-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    restart: unless-stopped

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
