services:
  # =============================================================================
  # POSTGRESQL 17
  # =============================================================================
  db:
    image: postgres:17-alpine
    container_name: prosell-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prosell_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # REDIS 7.4
  # =============================================================================
  redis:
    image: redis:7.4-alpine
    container_name: prosell-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # MINIO (S3-compatible local object storage — dev only)
  # =============================================================================
  minio:
    image: minio/minio:latest
    container_name: prosell-minio
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # MINIO INIT — create bucket + set public-read policy on startup
  # =============================================================================
  minio-init:
    image: minio/mc:latest
    container_name: prosell-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb local/${DO_BUCKET_NAME:-prosell-assets} --ignore-existing &&
      mc anonymous set download local/${DO_BUCKET_NAME:-prosell-assets} &&
      echo 'MinIO bucket ${DO_BUCKET_NAME:-prosell-assets} ready with anonymous read access'
      "
    restart: "no"

  # =============================================================================
  # POSTGRESQL 17 - TEST DATABASE
  # =============================================================================
  postgres-test:
    image: postgres:17
    container_name: prosell-test-db
    environment:
      POSTGRES_DB: prosell_test
      POSTGRES_USER: prosell
      POSTGRES_PASSWORD: prosell_test_password
    ports:
      - "5433:5432" # Different port to avoid conflicts
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prosell"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================================================
  # FASTAPI BACKEND
  # =============================================================================
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: prosell-api
    # Load .env from the repo root so DATABASE_URL, REDIS_URL, ADMIN_*, OAuth,
    # SendGrid, etc. are available inside the container.
    # Anything listed in `environment:` below overrides the value from .env.
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      # REDIS (in-container network name; explicit override for safety)
      - REDIS_URL=redis://redis:6379/0
      # JWT
      - JWT_PRIVATE_KEY_PATH=/app/keys/private.pem
      - JWT_PUBLIC_KEY_PATH=/app/keys/public.pem
      # APP
      - ENVIRONMENT=development
      - DEBUG=true
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8000
      # SECURITY
      - BCRYPT_ROUNDS=12
      - MAX_LOGIN_ATTEMPTS=5
      - ACCOUNT_LOCK_MINUTES=15
      # RATE LIMITING - relaxed for development/testing
      - RATE_LIMIT_AUTH_REQUESTS_PER_MINUTE=120
      # FEATURES
      - FEATURE_2FA_ENABLED=true
      - FEATURE_OAUTH_GOOGLE=true
      - FEATURE_OAUTH_FACEBOOK=false
      - FEATURE_REGISTRATION_ENABLED=true
      - FEATURE_PASSWORD_RESET=true
      # OAUTH - Google
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:8000/api/auth/oauth/google/callback}
      # OAUTH - Facebook (opcional)
      - FACEBOOK_OAUTH_APP_ID=${FACEBOOK_OAUTH_APP_ID:-}
      - FACEBOOK_OAUTH_APP_SECRET=${FACEBOOK_OAUTH_APP_SECRET:-}
      # ADMIN SEED
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@prosellweb.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      # EMAIL (Mock)
      - USE_MOCK_EMAIL=true
      # FILE STORAGE (MinIO in dev, DO Spaces in prod)
      - S3_ENDPOINT_URL=http://minio:9000
      # S3_PUBLIC_ENDPOINT_URL is the host the BROWSER uses to fetch presigned
      # URLs. Distinct from the internal docker network endpoint above because
      # the browser can't resolve `minio` as a hostname. Leave unset in prod
      # where DO Spaces' public endpoint matches the internal one.
      - S3_PUBLIC_ENDPOINT_URL=http://localhost:9000
      - S3_FORCE_PATH_STYLE=true
      - DO_BUCKET_NAME=${DO_BUCKET_NAME:-prosell-assets}
      - DO_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - DO_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      # Mount source code for hot-reload (dev only)
      - ../apps/api/src:/app/src:ro
      - ../apps/api/scripts:/app/scripts:ro
      - ../apps/api/alembic:/app/alembic:ro
      - ../apps/api/keys:/app/keys:ro
    command: sh -c "python /app/scripts/init-db.py && python /app/scripts/init_data.py || echo 'DB init failed' && uvicorn prosell.infrastructure.api.main:app --host 0.0.0.0 --port 8000 --reload"

  # =============================================================================
  # NGROK TUNNEL (HTTPS tunnel for OAuth development)
  # =============================================================================
  ngrok:
    image: ngrok/ngrok:latest
    container_name: prosell-ngrok
    # Expose ngrok web UI and API
    ports:
      - "4040:4040"
    env_file:
      - .env
    volumes:
      # Mount ngrok config
      - ./ngrok.yml:/etc/ngrok.yml:ro
    command: start --all --config /etc/ngrok.yml
    depends_on:
      api:
        condition: service_started

  # =============================================================================
  # NEXT.JS FRONTEND
  # =============================================================================
  web:
    build:
      context: ..
      dockerfile: docker/web-dev.Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: prosell-web
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true # Useful for WSL2/Docker volume sync
    depends_on:
      api:
        condition: service_started
    volumes:
      - ../apps/web:/app/apps/web
      # We don't mount node_modules to avoid host/container conflicts
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    # Use dev mode for hot-reload in development
    command: pnpm --filter @prosell/web dev

  # =============================================================================
  # TASKIQ WORKER (dev, opt-in via profile to avoid noisy parallel logs)
  # =============================================================================
  # Start with: docker compose --profile worker up worker
  # Same image as `api`, different entrypoint. Source mounted read-only for
  # hot-reload parity with the dev `api` service.
  worker:
    profiles: ["worker"]
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: prosell-worker
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - DEBUG=true
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../apps/api/src:/app/src:ro
      - ../apps/api/keys:/app/keys:ro
    command: ["python", "-m", "prosell.infrastructure.tasks.worker"]
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  postgres_test_data:
    driver: local
  minio_data:
    driver: local
